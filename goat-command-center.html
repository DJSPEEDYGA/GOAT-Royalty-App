<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐐 GOAT Force Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #030205 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(90deg, #d4a03c 0%, #f0c040 50%, #d4a03c 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(212, 160, 60, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .header h1 {
            font-size: 2.5em;
            color: #030205;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .header .subtitle {
            color: #030205;
            font-size: 1.2em;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .status-bar {
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid #d4a03c;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.online {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .status-indicator.offline {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid #d4a03c;
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 160, 60, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d4a03c;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #f0c040;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .app-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #58a6ff;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .app-item:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: #f0c040;
        }

        .app-name {
            font-weight: bold;
            color: #ffffff;
            font-size: 0.9em;
        }

        .app-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .app-status-dot.running {
            background: #00ff00;
        }

        .app-status-dot.stopped {
            background: #ff0000;
        }

        .btn {
            background: linear-gradient(45deg, #d4a03c, #f0c040);
            color: #030205;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8em;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: linear-gradient(45deg, #f0c040, #d4a03c);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(212, 160, 60, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.stop {
            background: linear-gradient(45deg, #c1121f, #ff4444);
            color: white;
        }

        .btn.stop:hover {
            background: linear-gradient(45deg, #ff4444, #c1121f);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-large {
            padding: 12px 24px;
            font-size: 1em;
        }

        .log-section {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #58a6ff;
            border-radius: 8px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #00ff00;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 2px 0;
        }

        .log-entry.error {
            color: #ff4444;
        }

        .log-entry.success {
            color: #00ff00;
        }

        .log-entry.info {
            color: #58a6ff;
        }

        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #d4a03c, #f0c040);
            border: none;
            color: #030205;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(212, 160, 60, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .refresh-btn:hover {
            transform: scale(1.1) rotate(180deg);
        }

        .section-title {
            color: #f0c040;
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #58a6ff;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #f0c040;
        }

        .stat-label {
            font-size: 0.8em;
            color: #ffffff;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐐 GOAT FORCE COMMAND CENTER 🐐</h1>
        <div class="subtitle">Supreme Commander Dashboard - DJ Speedy</div>
    </div>

    <div class="container">
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator online" id="intel-status"></div>
                <span>Intel Server</span>
            </div>
            <div class="status-item">
                <div class="status-indicator online" id="ollama-status"></div>
                <span>Ollama Server</span>
            </div>
            <div class="status-item">
                <div class="status-indicator online" id="chat-status"></div>
                <span>Chat Server</span>
            </div>
            <div class="status-item">
                <span id="current-time"></span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="total-apps">0</div>
                <div class="stat-label">Total Apps</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="running-apps">0</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stopped-apps">0</div>
                <div class="stat-label">Stopped</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="cpu-usage">0%</div>
                <div class="stat-label">CPU Usage</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">👑 Leadership</div>
                    <button class="btn" onclick="toggleSection('leadership')">Toggle</button>
                </div>
                <div id="leadership" class="app-grid">
                    <!-- Leadership apps will be populated here -->
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🧠 Core Agents</div>
                    <button class="btn" onclick="toggleSection('core')">Toggle</button>
                </div>
                <div id="core" class="app-grid">
                    <!-- Core agent apps will be populated here -->
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🎨 Specialized</div>
                    <button class="btn" onclick="toggleSection('specialized')">Toggle</button>
                </div>
                <div id="specialized" class="app-grid">
                    <!-- Specialized apps will be populated here -->
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">🛠️ Utilities</div>
                    <button class="btn" onclick="toggleSection('utilities')">Toggle</button>
                </div>
                <div id="utilities" class="app-grid">
                    <!-- Utility apps will be populated here -->
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">🎛️ Master Controls</div>
            </div>
            <div class="controls">
                <button class="btn btn-large" onclick="startAll()">🚀 Start All</button>
                <button class="btn btn-large stop" onclick="stopAll()">🛑 Stop All</button>
                <button class="btn btn-large" onclick="restartIntel()">🔄 Restart Intel</button>
                <button class="btn btn-large" onclick="openIntelDashboard()">📊 Intel Dashboard</button>
                <button class="btn btn-large" onclick="refreshStatus()">🔄 Refresh Status</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">📋 System Log</div>
                <button class="btn" onclick="clearLog()">Clear</button>
            </div>
            <div class="log-section" id="log-section">
                <div class="log-entry info">🐐 GOAT Force Command Center initialized...</div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshStatus()">🔄</button>

    <script>
        // Application definitions
        const applications = {
            leadership: [
                { name: 'THE GOAT — SUPREME COMMANDER', path: '/Applications/THE GOAT — SUPREME COMMANDER.app' },
                { name: 'THE GOAT — GOAT Force Supreme Commander', path: '/Applications/THE GOAT — GOAT Force Supreme Commander.app' },
                { name: 'THE GOAT', path: '/Applications/THE GOAT.app' },
                { name: 'Ms. Money Penny — BOSS LADY', path: '/Applications/Ms. Money Penny — BOSS LADY.app' },
                { name: 'Ms. Money Penny', path: '/Applications/Ms. Money Penny.app' },
                { name: 'Ms Money Penny — 🐐👑 Store', path: '/Applications/Ms Money Penny — 🐐👑 The GOAT Royalty Store by Life Imitates Art Inc..app' }
            ],
            core: [
                { name: 'Dr. Devin — WHAT'S UP DOC', path: '/Applications/Dr. Devin — WHAT'S UP DOC.app' },
                { name: 'Dr. Devin — GOAT Force AI', path: '/Applications/Dr. Devin — GOAT Force AI.app' },
                { name: 'Dr. Devin', path: '/Applications/Dr. Devin.app' },
                { name: 'Sir Codex — SENTINEL', path: '/Applications/Sir Codex — SENTINEL.app' },
                { name: 'Sir Codex', path: '/Applications/Sir Codex.app' },
                { name: 'Nexus — ORACLE', path: '/Applications/Nexus — ORACLE.app' },
                { name: 'Nexus', path: '/Applications/Nexus.app' },
                { name: 'Lexi — THE SPARK', path: '/Applications/Lexi — THE SPARK.app' },
                { name: 'Lexi', path: '/Applications/Lexi.app' },
                { name: 'Ms. Vanessa — ICON', path: '/Applications/Ms. Vanessa — ICON.app' },
                { name: 'Master Oscar — DEALMAKER', path: '/Applications/Master Oscar — DEALMAKER.app' },
                { name: 'Master Oscar', path: '/Applications/Master Oscar.app' }
            ],
            specialized: [
                { name: 'GONBRAZY — STUDIO BOSS', path: '/Applications/GONBRAZY — STUDIO BOSS.app' },
                { name: 'Wooh Da Kid — TONY STARKS', path: '/Applications/Wooh Da Kid — TONY STARKS.app' },
                { name: 'Hannah Miller — AMIGO KEEPER', path: '/Applications/Hannah Miller — AMIGO KEEPER.app' }
            ],
            utilities: [
                { name: 'GOAT Force Command Hub', path: '/Applications/GOAT Force Command Hub.app' },
                { name: 'GOAT Royalty App', path: '/Applications/GOAT Royalty App.app' },
                { name: 'Ms Money Penny — AI Tools', path: '/Applications/Ms Money Penny — AI Tools & Runtimes.app' }
            ]
        };

        let appStatus = {};

        // Initialize the command center
        function init() {
            populateApps();
            refreshStatus();
            updateTime();
            setInterval(updateTime, 1000);
            setInterval(refreshStatus, 30000); // Auto-refresh every 30 seconds
        }

        // Populate application cards
        function populateApps() {
            Object.keys(applications).forEach(section => {
                const container = document.getElementById(section);
                container.innerHTML = '';
                
                applications[section].forEach(app => {
                    const appElement = createAppElement(app, section);
                    container.appendChild(appElement);
                });
            });
        }

        // Create application element
        function createAppElement(app, section) {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.id = `app-${section}-${app.name.replace(/[^a-zA-Z0-9]/g, '')}`;
            
            div.innerHTML = `
                <div class="app-name">${app.name}</div>
                <div class="app-status">
                    <div class="app-status-dot stopped" id="status-${section}-${app.name.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                    <button class="btn" onclick="toggleApp('${section}', '${app.name}', '${app.path}')">Start</button>
                </div>
            `;
            
            return div;
        }

        // Toggle application
        async function toggleApp(section, appName, appPath) {
            const statusKey = `${section}-${appName.replace(/[^a-zA-Z0-9]/g, '')}`;
            const statusDot = document.getElementById(`status-${statusKey}`);
            const button = event.target;
            
            try {
                if (button.textContent === 'Start') {
                    log(`🚀 Starting ${appName}...`, 'info');
                    const response = await fetch('/api/start-app', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: appPath })
                    });
                    
                    if (response.ok) {
                        statusDot.className = 'app-status-dot running';
                        button.textContent = 'Stop';
                        button.className = 'btn stop';
                        log(`✅ ${appName} started successfully`, 'success');
                    } else {
                        log(`❌ Failed to start ${appName}`, 'error');
                    }
                } else {
                    log(`🛑 Stopping ${appName}...`, 'info');
                    const response = await fetch('/api/stop-app', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: appName })
                    });
                    
                    if (response.ok) {
                        statusDot.className = 'app-status-dot stopped';
                        button.textContent = 'Start';
                        button.className = 'btn';
                        log(`✅ ${appName} stopped successfully`, 'success');
                    } else {
                        log(`❌ Failed to stop ${appName}`, 'error');
                    }
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
            
            refreshStatus();
        }

        // Start all applications
        async function startAll() {
            log('🚀 Starting all GOAT Force applications...', 'info');
            // Implementation would start all apps
            refreshStatus();
        }

        // Stop all applications
        async function stopAll() {
            log('🛑 Stopping all GOAT Force applications...', 'info');
            // Implementation would stop all apps
            refreshStatus();
        }

        // Restart Intel Server
        async function restartIntel() {
            log('🔄 Restarting Intel Server...', 'info');
            // Implementation would restart Intel Server
            refreshStatus();
        }

        // Open Intel Dashboard
        function openIntelDashboard() {
            window.open('http://localhost:5500', '_blank');
            log('📊 Opening Intel Dashboard...', 'info');
        }

        // Refresh status
        async function refreshStatus() {
            try {
                // Check Intel Server
                const intelResponse = await fetch('http://localhost:5500/health');
                const intelStatus = document.getElementById('intel-status');
                intelStatus.className = intelResponse.ok ? 'status-indicator online' : 'status-indicator offline';
                
                // Check Ollama Server
                const ollamaResponse = await fetch('http://localhost:11434/api/tags');
                const ollamaStatus = document.getElementById('ollama-status');
                ollamaStatus.className = ollamaResponse.ok ? 'status-indicator online' : 'status-indicator offline';
                
                // Update app statuses (simplified for demo)
                updateAppStatuses();
                updateStats();
                
                log('🔄 Status refreshed', 'info');
            } catch (error) {
                log(`❌ Status refresh failed: ${error.message}`, 'error');
            }
        }

        // Update application statuses
        function updateAppStatuses() {
            // This would normally check actual running processes
            // For demo, we'll simulate some apps running
            const runningApps = [
                'THE GOAT',
                'Ms. Money Penny',
                'Dr. Devin',
                'Sir Codex',
                'Nexus',
                'Lexi',
                'Master Oscar',
                'GONBRAZY — STUDIO BOSS',
                'Wooh Da Kid — TONY STARKS',
                'Hannah Miller — AMIGO KEEPER',
                'GOAT Force Command Hub',
                'GOAT Royalty App'
            ];
            
            Object.keys(applications).forEach(section => {
                applications[section].forEach(app => {
                    const statusKey = `${section}-${app.name.replace(/[^a-zA-Z0-9]/g, '')}`;
                    const statusDot = document.getElementById(`status-${statusKey}`);
                    const button = document.querySelector(`#app-${statusKey} button`);
                    
                    if (statusDot && button) {
                        if (runningApps.includes(app.name)) {
                            statusDot.className = 'app-status-dot running';
                            button.textContent = 'Stop';
                            button.className = 'btn stop';
                        } else {
                            statusDot.className = 'app-status-dot stopped';
                            button.textContent = 'Start';
                            button.className = 'btn';
                        }
                    }
                });
            });
        }

        // Update statistics
        function updateStats() {
            const totalApps = Object.values(applications).flat().length;
            const runningApps = document.querySelectorAll('.app-status-dot.running').length;
            const stoppedApps = totalApps - runningApps;
            
            document.getElementById('total-apps').textContent = totalApps;
            document.getElementById('running-apps').textContent = runningApps;
            document.getElementById('stopped-apps').textContent = stoppedApps;
            document.getElementById('cpu-usage').textContent = Math.floor(Math.random() * 30 + 10) + '%';
        }

        // Toggle section visibility
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.style.display = section.style.display === 'none' ? 'grid' : 'none';
        }

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Add log entry
        function log(message, type = 'info') {
            const logSection = document.getElementById('log-section');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logSection.appendChild(logEntry);
            logSection.scrollTop = logSection.scrollHeight;
        }

        // Clear log
        function clearLog() {
            document.getElementById('log-section').innerHTML = 
                '<div class="log-entry info">📋 Log cleared...</div>';
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
