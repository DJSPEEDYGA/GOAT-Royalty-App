# GOAT Royalty Agent Fleet Configuration
# Place this on your external drive: /mnt/goat-storage/config/agents/fleet.yaml
# Money Penny loads this (or falls back to defaults in money-penny-agent.py)

agents:
  money_penny:
    device: jetson-thor
    model: llama3:70b
    role: orchestrator
    host: localhost
    port: 11434
    capabilities:
      - task_management
      - coordination
      - scheduling
      - agent_delegation

  # Agent007 (example of an agent that already received the upgrades)
  agent007:
    device: jetson-thor
    model: codellama:70b
    role: development_security
    host: localhost
    port: 11434
    capabilities:
      - coding
      - debugging
      - scripts
      - security_checks
      - evidence_logging
      - chain_of_custody

  # Lexi - now gets the same upgrades as Agent007
  # (evidence logging for hard drives, drive monitoring "drives are up now",
  #  security posture, chain of custody, post-FBI / agency contact protection)
  lexi:
    device: jetson-thor   # Change to the actual Jetson board Lexi runs on (e.g. one of your AGENT or new flashed boards)
    model: llama3:70b     # Upgraded model - match or exceed Agent007's
    role: evidence_security
    host: localhost
    port: 11434
    capabilities:
      - evidence_logging
      - drive_monitoring
      - security_checks
      - chain_of_custody
      - jetson_deployment
      - agent_upgrades
      - hard_drive_protection
      - voice_interface   # if you want her to also handle voice like the old voice_agent

  # Keep other agents as needed (analytics, social, voice, code, etc.)
  analytics_agent:
    device: jetson-orin-64gb
    model: mistral:7b
    role: data_analysis
    host: 192.168.1.101
    port: 11434
    capabilities:
      - analytics
      - reporting
      - insights

  # ... add the rest of your crew here
