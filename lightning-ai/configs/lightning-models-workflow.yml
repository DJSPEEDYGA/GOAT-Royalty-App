# ============================================================================
# Lightning AI Model APIs — NeMo Agent Toolkit Workflow Configuration
# ============================================================================
# Integrates Lightning AI's unified model gateway with the Ms Money Penny
# Desktop Store App via NVIDIA NeMo Agent Toolkit.
#
# Platform: https://lightning.ai
# Version:  1.0.0
# ============================================================================

workflow:
  name: "lightning-ai-store-assistant"
  version: "1.0.0"
  description: >
    Ms Money Penny AI-powered store assistant using Lightning AI Model APIs.
    Routes requests to the optimal model based on task complexity, latency
    requirements, and cost budget.

# --------------------------------------------------------------------------
# Provider Configuration
# --------------------------------------------------------------------------
providers:
  lightning_ai:
    type: "openai-compatible"
    base_url: "https://api.lightning.ai/v1"
    api_key: "${LIGHTNING_API_KEY}"
    timeout: 60
    max_retries: 3
    retry_delay: 1.0

# --------------------------------------------------------------------------
# Model Registry — All available Lightning AI models
# --------------------------------------------------------------------------
models:
  # --- Lightning AI Native Models ---
  gpt-oss-20b:
    provider: lightning_ai
    model_id: "gpt-oss-20b"
    context_length: 128000
    cost_input: 0.05
    cost_output: 0.20
    cache_input: 0.01
    cache_output: 0.05
    latency_avg: 3.04
    throughput_avg: 6.43
    tier: "economy"
    use_cases:
      - "simple-completions"
      - "batch-processing"
      - "classification"
      - "data-extraction"

  gpt-oss-120b:
