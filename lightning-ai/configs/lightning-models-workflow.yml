# --------------------------------------------------------------------------
# Smart Router — Routes requests to optimal model
# --------------------------------------------------------------------------
router:
  strategy: "cost-performance-balanced"
  
  rules:
    # Economy tier — simple tasks, batch processing
    - name: "economy-routing"
      condition:
        task_type:
          - "classification"
          - "extraction"
          - "simple-completion"
        max_budget_per_request: 0.001
      models:
        primary: "gpt-oss-20b"
        fallback: "gpt-5-nano"

    # Standard tier — production workloads
    - name: "standard-routing"
      condition:
        task_type:
          - "chat"
          - "content-creation"
          - "code-generation"
        latency_requirement: "< 2s"
      models:
        primary: "gpt-oss-120b"
        fallback: "llama-3.3-70b"
        overflow: "gemini-3-flash"

    # Reasoning tier — complex analysis
    - name: "reasoning-routing"
      condition:
        task_type:
          - "reasoning"
          - "analysis"
          - "mathematics"
      models:
        primary: "deepseek-v3.1"
        fallback: "gpt-5-mini"

    # Long-context tier — large documents
    - name: "long-context-routing"
      condition:
        input_tokens: "> 128000"
      models:
        primary: "gemini-3-flash"
        fallback: "nvidia-nemotron-3-super-120b"
        overflow: "kimi-k2.5"

    # High-throughput tier — maximum speed
    - name: "throughput-routing"
      condition:
        throughput_requirement: "> 200 tok/s"
      models:
        primary: "nvidia-nemotron-3-super-120b"
        fallback: "kimi-k2.5"

    # Enterprise tier — mission-critical
    - name: "enterprise-routing"
      condition:
        priority: "critical"
        sla: "99.9%"
      models:
        primary: "nvidia-nemotron-3-super-120b"
        fallback: "gpt-oss-120b"
        overflow: "gemini-3-flash"

# --------------------------------------------------------------------------
# Store Integration — Ms Money Penny Store Agents
# --------------------------------------------------------------------------
agents:
  shopping_assistant:
    name: "Ms Money Penny Shopping Assistant"
    model: "gpt-oss-120b"
    fallback_model: "llama-3.3-70b"
    system_prompt: >
      You are Ms Money Penny, the AI shopping assistant for Life Imitates Art Inc.
      Help customers find products, answer questions about orders, and provide
      personalized recommendations. Be friendly, knowledgeable, and professional.
    max_tokens: 1024
    temperature: 0.7
    tools:
      - "product_search"
      - "order_lookup"
      - "recommendation_engine"
      - "inventory_check"

  product_analyst:
    name: "Product Analysis Agent"
    model: "deepseek-v3.1"
    fallback_model: "gemini-2.5-flash"
    system_prompt: >
      Analyze product data, market trends, and customer behavior to provide
      actionable insights for the Ms Money Penny Store.
    max_tokens: 2048
    temperature: 0.3
    tools:
      - "analytics_dashboard"
      - "trend_analysis"
      - "competitor_scan"

  content_creator:
    name: "Store Content Generator"
    model: "minimax-m2.5"
    fallback_model: "gpt-oss-120b"
    system_prompt: >
      Generate engaging product descriptions, marketing copy, and creative
      content for the Ms Money Penny Store catalog.
    max_tokens: 4096
    temperature: 0.8
    tools:
      - "image_description"
      - "seo_optimizer"
      - "social_media_formatter"

  document_processor:
    name: "Document Processing Agent"
    model: "gemini-3-flash"
    fallback_model: "nvidia-nemotron-3-super-120b"
    system_prompt: >
      Process, analyze, and extract information from store documents including
      invoices, contracts, product catalogs, and customer communications.
    max_tokens: 8192
    temperature: 0.2
    tools:
      - "pdf_extractor"
      - "invoice_parser"
      - "contract_analyzer"

# --------------------------------------------------------------------------
# Monitoring & Cost Management
# --------------------------------------------------------------------------
monitoring:
  enabled: true
  metrics:
    - "token_usage"
    - "cost_per_request"
    - "latency_p50"
    - "latency_p99"
    - "error_rate"
    - "cache_hit_rate"
  alerts:
    daily_budget_limit: 100.00  # Lightning credits
    per_request_limit: 5.00
    error_rate_threshold: 0.05
    latency_threshold: 10.0
  dashboard:
    url: "https://lightning.ai/dashboard"
    refresh_interval: 30

# --------------------------------------------------------------------------
# Caching Configuration
# --------------------------------------------------------------------------
caching:
  enabled: true
  strategy: "semantic"
  ttl: 3600  # 1 hour
  max_entries: 10000
  cache_system_prompts: true
  cache_common_queries: true
  similarity_threshold: 0.95