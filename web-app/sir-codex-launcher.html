<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sir Codex Launcher</title>
  <link rel="stylesheet" href="css/goat-theme.css">
  <link rel="stylesheet" href="css/goat-brand.css">
  <link rel="stylesheet" href="crew-launcher-template.css">
</head>
<body data-crew="sir-codex">
  <div class="goat-bg"></div><div class="goat-bg-overlay"></div>
  <main class="crew-launcher-shell">
    <section class="crew-launcher-hero"><div class="crew-launcher-eyebrow">separate launcher</div><h1 id="crewName">Sir Codex</h1><p id="lane">Loading launcher...</p><div class="founding-note" id="foundingNote"></div></section>
    <section class="crew-launcher-grid"><article class="crew-panel"><h2>Code Name</h2><div class="code-pill" id="codeName"></div><p><strong>Lead:</strong> <span id="lead"></span></p><p><strong>Status:</strong> <span id="status"></span></p><p id="houseRule"></p><div class="launcher-actions" id="launcherLinks"></div></article><article class="crew-panel"><h2>Shared GOAT Bench</h2><ul id="sharedAccess"></ul></article><article class="crew-panel"><h2>Approval Gates</h2><ul id="approvalGates"></ul></article></section>
  </main>
  <script type="module" src="js/goat-named-launcher.js"></script>
</body>
</html>
