<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GOAT Distribution — DSP Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111928;--bg4:#1a2336;
  --border:rgba(212,160,60,0.18);--gold:#d4a03c;--gold2:#f0c040;
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --cyan:#00d4ff;--orange:#f39c12;--pink:#e91e8c;
  --text:#f0ece4;--sub:#7a7060;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;overflow-x:hidden}
#app{display:flex;flex-direction:column;min-height:100vh}
/* TOPBAR */
#topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:800;color:var(--gold)}
.tb-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s;text-decoration:none}
.tb-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--gold)}
.spacer{flex:1}
/* BANNER */
#banner{background:linear-gradient(135deg,#0d1420,#1a2336);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:24px}
.banner-stat{text-align:center;flex:1}
.banner-val{font-size:28px;font-weight:900;color:var(--gold);font-family:sans-serif}
.banner-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.banner-change{font-size:10px;color:var(--green);margin-top:2px}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}
/* LEFT - RELEASES */
#left{width:260px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.release-card{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:all .2s}
.release-card:hover,.release-card.sel{background:var(--bg3)}
.release-card.sel .rc-title{color:var(--gold)}
.rc-art{width:44px;height:44px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.rc-title{font-size:11px;font-weight:700;color:var(--text)}
.rc-artist{font-size:10px;color:var(--sub)}
.rc-meta{font-size:9px;color:var(--sub);margin-top:2px}
.rc-status{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700}
/* CENTER */
#center{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;position:sticky;top:44px;z-index:50}
.tab{padding:9px 18px;font-size:11px;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.act{color:var(--gold);border-bottom-color:var(--gold)}
#tab-content{flex:1;padding:20px;overflow-y:auto}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
/* PLATFORM GRID */
.plat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.plat-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;transition:all .2s;cursor:pointer}
.plat-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.plat-icon{font-size:24px;margin-bottom:6px}
.plat-name{font-size:10px;font-weight:700;color:var(--text);margin-bottom:4px}
.plat-status{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;display:inline-block}
.plat-streams{font-size:10px;color:var(--sub);margin-top:4px}
.plat-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:6px;overflow:hidden}
.plat-fill{height:100%;border-radius:2px;transition:width .6s}
/* CHART */
.chart-wrap{position:relative}
#earnings-chart{display:block;width:100%;border-radius:6px}
.chart-legend{display:flex;gap:16px;margin-top:8px;justify-content:flex-end}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--sub)}
.legend-dot{width:8px;height:8px;border-radius:50%}
/* TRACKS TABLE */
.tracks-table{width:100%;border-collapse:collapse}
.tracks-table th{font-size:9px;color:var(--sub);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
.tracks-table td{font-size:10px;padding:8px 8px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text)}
.tracks-table tr:hover td{background:var(--bg3)}
/* SUBMIT */
.platform-check{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.platform-check.sel{border-color:var(--gold);background:rgba(212,160,60,.08)}
/* RIGHT PANEL */
#right{width:220px;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:10px}
.rp-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:10px}
.timeline-item{display:flex;gap:8px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:2px}
.tl-text{font-size:10px;color:var(--text);line-height:1.5}
.tl-date{font-size:9px;color:var(--sub)}
.royalty-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.royalty-bar-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:8px}
.royalty-bar-fill{height:100%;border-radius:2px}
.payout-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:10px}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

function drawChart(r){
  const cv=document.getElementById('streams-chart');
  if(!cv)return;
  cv.width=cv.offsetWidth||600;const w=cv.width,h=140;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  const pts=12;
  // generate monthly data
  const streamData=Array.from({length:pts},(_,i)=>Math.max(0,r.streams/pts*(0.5+Math.random()*1.0)*(i/pts+0.4)));
  const revenueData=streamData.map(s=>s/500);
  const maxS=Math.max(...streamData)||1;
  const maxR=Math.max(...revenueData)||1;
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  for(let y=0;y<=4;y++){const yy=h-20-(y/4)*(h-30);ctx.beginPath();ctx.moveTo(40,yy);ctx.lineTo(w-10,yy);ctx.stroke();}
  // axes
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.beginPath();ctx.moveTo(40,10);ctx.lineTo(40,h-20);ctx.lineTo(w-10,h-20);ctx.stroke();
  // draw streams
  ctx.beginPath();
  streamData.forEach((v,i)=>{
    const x=40+(w-50)*i/(pts-1);const y2=h-20-(v/maxS)*(h-30);
    i===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  });
  ctx.strokeStyle='var(--cyan)';ctx.lineWidth=2;ctx.stroke();
  ctx.lineTo(40+(w-50)*(pts-1)/(pts-1),h-20);ctx.lineTo(40,h-20);ctx.closePath();
  ctx.fillStyle='rgba(0,212,255,0.08)';ctx.fill();
  // draw revenue
  ctx.beginPath();
  revenueData.forEach((v,i)=>{
    const x=40+(w-50)*i/(pts-1);const y2=h-20-(v/maxR)*(h-30);
    i===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  });
  ctx.strokeStyle='var(--gold)';ctx.lineWidth=2;ctx.stroke();
  ctx.lineWidth=1;
  // month labels
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px monospace';ctx.textAlign='center';
  streamData.forEach((_,i)=>{
    const x=40+(w-50)*i/(pts-1);
    ctx.fillText(months[i],x,h-6);
  });
}

  `).join('');

  const pr=document.getElementById('plat-revenue');

    const total=releases.reduce((a,r)=>{const d=r.platforms[p.id];return a+(d?.revenue||0);},0);
    return {...p,total};
  }).filter(p=>p.total>0).sort((a,b)=>b.total-a.total);
  const maxPRev=Math.max(...platTotals.map(p=>p.total))||1;
  pr.innerHTML=platTotals.map(p=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:14px;width:20px">${p.icon}</span>
      <span style="width:100px;font-size:10px">${p.name}</span>
      <div style="flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">

      </div>
      <span style="width:70px;font-size:10px;color:var(--gold);text-align:right">$${fmtNum(p.total)}</span>
    </div>
  `).join('');
  setTimeout(()=>{
    const cv=document.getElementById('earnings-chart');
    if(cv){cv.width=cv.offsetWidth||600;drawEarningsHistory(cv);}
  },50);

function drawEarningsHistory(cv){
  const w=cv.width,h=130;const ctx=cv.getContext('2d');
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const data=months.map((_,i)=>800+i*120+Math.random()*400);
  const maxD=Math.max(...data);
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  for(let y=0;y<=4;y++){const yy=h-20-(y/4)*(h-30);ctx.beginPath();ctx.moveTo(40,yy);ctx.lineTo(w-10,yy);ctx.stroke();}
  ctx.beginPath();
  data.forEach((v,i)=>{
    const x=40+(w-50)*i/(months.length-1);const y2=h-20-(v/maxD)*(h-30);
    i===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  });
  ctx.strokeStyle='var(--gold)';ctx.lineWidth=2;ctx.stroke();
  ctx.lineTo(w-10,h-20);ctx.lineTo(40,h-20);ctx.closePath();
  ctx.fillStyle='rgba(212,160,60,0.1)';ctx.fill();ctx.lineWidth=1;
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px monospace';ctx.textAlign='center';
  data.forEach((_,i)=>{const x=40+(w-50)*i/(months.length-1);ctx.fillText(months[i],x,h-6);});
}

// ── HELPERS ──
function fmtNum(n){
  n=Math.floor(n);
  if(n>=1000000)return (n/1000000).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(1)+'K';
  return String(n);
}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function statusStyle(s){
  const map={live:'background:rgba(46,204,113,0.15);color:#2ecc71',processing:'background:rgba(52,152,219,0.15);color:#3498db',pending:'background:rgba(243,156,18,0.15);color:#f39c12',scheduled:'background:rgba(155,89,182,0.15);color:#9b59b6',paid:'background:rgba(46,204,113,0.15);color:#2ecc71',expired:'background:rgba(231,76,60,0.15);color:#e74c3c','not submitted':'background:rgba(122,112,96,0.15);color:#7a7060',unavailable:'background:rgba(122,112,96,0.15);color:#7a7060'};
  return map[s]||map['not submitted'];
}
function selRel(i){selRelease=i;buildReleaseList();renderTab(currentTab);buildRightPanel();}
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='overview')renderOverview();
  else if(tab==='platforms')renderPlatforms();
  else if(tab==='earnings')renderEarnings();
  else if(tab==='tracks')renderTracks();
  else if(tab==='submit')renderSubmit();
}
function newRelease(){alert('New Release Wizard\n[Opens full release builder]');}
function submitAll(){document.getElementById('submit-status')&&(document.getElementById('submit-status').textContent='Submitting to all platforms…');alert('Submitting to all '+PLATFORMS.length+' platforms!');}
function submitSelected(){alert('Submitting to '+selPlatforms.size+' selected platforms!');}

// ── INIT ──

  buildBanner();
  buildReleaseList();
  renderOverview();
  buildRightPanel();
}
