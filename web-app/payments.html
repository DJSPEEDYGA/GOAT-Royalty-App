<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 Payments & Payouts | GOAT Royalty App</title>
    <link rel="stylesheet" href="css/goat-theme.css">
    <link rel="stylesheet" href="css/goat-brand.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(212, 160, 60, 0.1);
            border: 2px solid #d4a03c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            color: #d4a03c;
            font-weight: bold;
        }
        .payment-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        .payment-table th, .payment-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(212, 160, 60, 0.3);
        }
        .payment-table th {
            background: rgba(212, 160, 60, 0.2);
            color: #d4a03c;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .status-completed { background: #28a745; color: white; }
        .status-pending { background: #ffc107; color: black; }
        .status-processing { background: #17a2b8; color: white; }
        .status-failed { background: #dc3545; color: white; }
        .payment-form {
            background: rgba(212, 160, 60, 0.1);
            border: 2px solid #d4a03c;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }
        .payment-form input, .payment-form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d4a03c;
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #d4a03c;
        }
        .payment-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #d4a03c, #b8860b);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 10px;
        }
        .payment-form button:hover {
            transform: scale(1.02);
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="goat-bg"></div>
    <div class="goat-bg-overlay"></div>

    <nav class="top-nav">
        <a href="index.html" class="logo">
            <img src="money-penny-logo.png" alt="Ms. Money Penny" class="nav-logo-mp">
            <img src="goat-logo.png" alt="GOAT" class="nav-logo-goat">
            <span>Ms. Money Penny</span>
            <span class="crown-badge">👑 GOAT</span>
        </a>
    </nav>

    <div class="container" style="max-width: 1400px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align: center; color: #d4a03c; font-size: 3em;">💳 Payments & Payouts</h1>
        <p style="text-align: center; color: #d4a03c; margin-bottom: 30px;">Manage all payments and royalty payouts</p>

        <!-- Payment Statistics -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-value">$<span id="totalPayments">0.00</span></div>
                <div>Total Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">$<span id="pendingPayments">0.00</span></div>
                <div>Pending Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">$<span id="completedPayments">0.00</span></div>
                <div>Completed Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="paymentCount">0</div>
                <div>Total Transactions</div>
            </div>
        </div>

        <!-- Create New Payment -->
        <div class="payment-form">
            <h2 style="color: #d4a03c; margin-bottom: 20px;">Create New Payment</h2>
            <form id="paymentForm">
                <label>Artist</label>
                <select id="artistSelect" required>
                    <option value="">Select Artist</option>
                </select>
                
                <label>Payment Method</label>
                <select id="paymentMethod" required>
                    <option value="bank_transfer">Bank Transfer</option>
                    <option value="paypal">PayPal</option>
                    <option value="crypto">Cryptocurrency</option>
                    <option value="check">Check</option>
                </select>
                
                <label>Amount</label>
                <input type="number" id="paymentAmount" placeholder="Amount in USD" required min="0.01" step="0.01">
                
                <label>Payment Date</label>
                <input type="date" id="paymentDate" required>
                
                <label>Notes</label>
                <input type="text" id="paymentNotes" placeholder="Payment notes">
                
                <button type="submit">💰 Create Payment</button>
            </form>
        </div>

        <!-- Payment History -->
        <div style="margin-top: 40px;">
            <h2 style="color: #d4a03c; margin-bottom: 20px;">Payment History</h2>
            
            <div style="margin-bottom: 20px;">
                <select id="statusFilter" style="padding: 10px; border: 1px solid #d4a03c; border-radius: 8px; background: rgba(0,0,0,0.5); color: #d4a03c;">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="processing">Processing</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                </select>
                <select id="methodFilter" style="padding: 10px; border: 1px solid #d4a03c; border-radius: 8px; background: rgba(0,0,0,0.5); color: #d4a03c;">
                    <option value="">All Methods</option>
                    <option value="bank_transfer">Bank Transfer</option>
                    <option value="paypal">PayPal</option>
                    <option value="crypto">Cryptocurrency</option>
                    <option value="check">Check</option>
                </select>
                <button onclick="loadPayments()" style="padding: 10px 20px; background: #d4a03c; border: none; border-radius: 8px; color: white; cursor: pointer;">🔄 Refresh</button>
            </div>
            
            <table class="payment-table">
                <thead>
                    <tr>
                        <th>Transaction ID</th>
                        <th>Artist</th>
                        <th>Method</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center;">Loading payments...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Payment API calls
        async function loadPayments() {
            try {
                const statusFilter = document.getElementById('statusFilter').value;
                const methodFilter = document.getElementById('methodFilter').value;
                
                let url = '/api/payments';
                const params = new URLSearchParams();
                if (statusFilter) params.append('status', statusFilter);
                if (methodFilter) params.append('method', methodFilter);
                if (params.toString()) url += '?' + params.toString();
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    displayPayments(data.data.payments);
                    updatePaymentAnalytics();
                }
            } catch (error) {
                console.error('Error loading payments:', error);
            }
        }
        
        async function updatePaymentAnalytics() {
            try {
                const response = await fetch('/api/payments/analytics');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalPayments').textContent = data.data.summary.totalPayments.toFixed(2);
                    document.getElementById('pendingPayments').textContent = data.data.summary.pendingPayments.toFixed(2);
                    document.getElementById('completedPayments').textContent = data.data.summary.completedPayments.toFixed(2);
                    document.getElementById('paymentCount').textContent = data.data.summary.count;
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }
        
        function displayPayments(payments) {
            const tbody = document.getElementById('paymentTableBody');
            
            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No payments found</td></tr>';
                return;
            }
            
            tbody.innerHTML = payments.map(payment => `
                <tr>
                    <td><strong>${payment.transactionId || 'N/A'}</strong></td>
                    <td>${payment.artist?.name || 'Unknown'}</td>
                    <td>${getPaymentMethodLabel(payment.method)}</td>
                    <td>$${payment.totalAmount.toFixed(2)}</td>
                    <td>${new Date(payment.paymentDate).toLocaleDateString()}</td>
                    <td><span class="status-badge status-${payment.status}">${payment.status.toUpperCase()}</span></td>
                    <td>
                        <button onclick="viewPayment('${payment._id}')" style="padding: 5px 10px; background: #d4a03c; border: none; border-radius: 5px; cursor: pointer;">View</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getPaymentMethodLabel(method) {
            const labels = {
                'bank_transfer': 'Bank Transfer',
                'paypal': 'PayPal',
                'crypto': 'Cryptocurrency',
                'check': 'Check'
            };
            return labels[method] || method;
        }
        
        // Create payment
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const paymentData = {
                artist: document.getElementById('artistSelect').value,
                method: document.getElementById('paymentMethod').value,
                totalAmount: parseFloat(document.getElementById('paymentAmount').value),
                paymentDate: document.getElementById('paymentDate').value,
                notes: document.getElementById('paymentNotes').value
            };
            
            try {
                const response = await fetch('/api/payments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Payment created successfully!');
                    document.getElementById('paymentForm').reset();
                    loadPayments();
                } else {
                    alert('Error creating payment: ' + data.message);
                }
            } catch (error) {
                alert('Error creating payment: ' + error.message);
            }
        });
        
        // Filter change events
        document.getElementById('statusFilter').addEventListener('change', loadPayments);
        document.getElementById('methodFilter').addEventListener('change', loadPayments);
        
        // Load artists
        async function loadArtists() {
            try {
                const response = await fetch('/api/artists');
                const data = await response.json();
                
                if (data.success && data.data.artists) {
                    const artistSelect = document.getElementById('artistSelect');
                    artistSelect.innerHTML = '<option value="">Select Artist</option>';
                    
                    data.data.artists.forEach(artist => {
                        const option = document.createElement('option');
                        option.value = artist._id;
                        option.textContent = artist.name;
                        artistSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading artists:', error);
            }
        }
        
        // View payment details
        async function viewPayment(paymentId) {
            try {
                const response = await fetch(`/api/payments/${paymentId}`);
                const data = await response.json();
                
                if (data.success) {
                    const payment = data.data.payment;
                    alert(`Payment Details:\n\nID: ${payment.transactionId}\nArtist: ${payment.artist?.name || 'Unknown'}\nAmount: $${payment.totalAmount.toFixed(2)}\nStatus: ${payment.status.toUpperCase()}\nMethod: ${getPaymentMethodLabel(payment.method)}\nDate: ${new Date(payment.paymentDate).toLocaleDateString()}\nNotes: ${payment.notes || 'None'}`);
                }
            } catch (error) {
                console.error('Error viewing payment:', error);
                alert('Error loading payment details');
            }
        }
        
        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadArtists();
            loadPayments();
            document.getElementById('paymentDate').valueAsDate = new Date();
        });
    </script>
</body>
</html>
