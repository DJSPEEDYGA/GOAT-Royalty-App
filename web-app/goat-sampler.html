<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎛️ GOAT Sampler — Ultimate Sample Engine</title>
<link rel="stylesheet" href="css/goat-touch.css">
<style>
:root{
  --bg:#030507;--panel:#0d1117;--panel2:#161b22;--panel3:#1f2937;
  --gold:#d4a03c;--gold2:#f0c040;--red:#c1121f;--red2:#e63946;
  --ink:#f0ece4;--dim:#8b949e;--line:#21262d;
  --ok:#3fb950;--warn:#d29922;--info:#58a6ff;--purple:#a78bfa;--cyan:#22d3ee;--orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:manipulation;}

.topbar{height:52px;background:rgba(3,5,7,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.tb-back{color:var(--gold);text-decoration:none;font-size:14px;font-weight:600;}
.tb-title{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-right{margin-left:auto;display:flex;gap:6px;}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--panel2);border:1px solid var(--line);color:var(--ink);transition:all .15s;}
.btn:active{transform:scale(.95);}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;}
.btn.red{background:rgba(193,18,31,.8);color:#fff;border:none;}
.btn.green{background:rgba(63,185,80,.8);color:#000;border:none;}

.view-tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--line);padding:0 16px;gap:4px;flex-shrink:0;}
.vtab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--dim);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;}
.vtab.active{color:var(--gold);border-bottom-color:var(--gold);}

.content{height:calc(100vh - 102px);overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}

/* DROP ZONE */
.drop-zone{background:linear-gradient(135deg,rgba(212,160,60,.06),var(--panel));border:2px dashed rgba(212,160,60,.3);border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--gold);background:rgba(212,160,60,.1);}
.drop-zone .dz-icon{font-size:40px;margin-bottom:8px;}
.drop-zone h3{color:var(--gold);margin-bottom:6px;}
.drop-zone p{color:var(--dim);font-size:13px;}

/* WAVEFORM */
.waveform-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.wform-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);}
.wform-header .fname{font-size:13px;font-weight:600;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wform-canvas{position:relative;background:#000;}
.wform-canvas canvas{display:block;width:100%;height:120px;}
.wform-playhead{position:absolute;top:0;left:0;width:2px;height:100%;background:var(--gold);pointer-events:none;transition:left .05s linear;}
.wform-selection{position:absolute;top:0;height:100%;background:rgba(212,160,60,.15);pointer-events:none;}
.wform-controls{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap;}

/* INFO ROW */
.info-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;}
.info-box{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center;}
.info-box .iv{font-size:18px;font-weight:800;color:var(--gold);}
.info-box .il{font-size:10px;color:var(--dim);text-transform:uppercase;}

/* KNOBS */
.knobs-section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
.knobs-section h4{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.knobs-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.knobs-row::-webkit-scrollbar{display:none;}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:60px;}
.knob{width:48px;height:48px;border-radius:50%;background:var(--panel3);border:2px solid var(--line);cursor:pointer;position:relative;user-select:none;}
.knob-inner{position:absolute;top:50%;left:50%;width:4px;height:16px;background:var(--gold);border-radius:2px;transform-origin:50% 100%;transform:translate(-50%,0) rotate(-135deg);}
.knob-label{font-size:9px;color:var(--dim);text-transform:uppercase;text-align:center;}
.knob-val{font-size:10px;color:var(--gold);font-weight:700;}

/* SLICE PADS */
.slice-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.slice-pad{aspect-ratio:1.5;background:var(--panel2);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;position:relative;overflow:hidden;}
.slice-pad:active,.slice-pad.hit{transform:scale(.93);filter:brightness(1.5);}
.slice-pad .sp-num{position:absolute;top:4px;left:6px;font-size:9px;color:var(--dim);}
.slice-pad .sp-label{font-size:11px;font-weight:700;color:var(--ink);}
.slice-pad .sp-time{font-size:10px;color:var(--dim);}
.slice-pad.active{border-color:var(--gold);background:rgba(212,160,60,.12);}
.slice-pad .sp-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--gold);transition:width .1s;}

/* STEMS */
.stems-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.stem-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;}
.stem-card .stem-name{font-size:14px;font-weight:700;margin-bottom:8px;}
.stem-card .stem-canvas{height:40px;background:#000;border-radius:6px;overflow:hidden;}
.stem-card .stem-canvas canvas{display:block;width:100%;height:40px;}
.stem-card .stem-controls{display:flex;gap:6px;margin-top:8px;align-items:center;}
.stem-vol{flex:1;accent-color:var(--gold);}
.stem-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:11px;font-weight:700;cursor:pointer;}
.stem-btn.solo{background:rgba(212,160,60,.2);border-color:var(--gold);color:var(--gold);}
.stem-btn.mute{background:rgba(193,18,31,.2);border-color:var(--red2);color:var(--red2);}

/* PITCH/TIME */
.pt-section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
.pt-section h4{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slider-row label{font-size:12px;color:var(--dim);width:80px;flex-shrink:0;}
.slider-row input{flex:1;accent-color:var(--gold);}
.slider-row .sv{font-size:12px;color:var(--gold);font-weight:700;width:48px;text-align:right;}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<div class="topbar">
  <a href="touch-hub.html" class="tb-back">← Hub</a>
  <div class="tb-title">🎛️ GOAT Sampler</div>
  <div class="tb-right">
    <button class="btn" onclick="document.getElementById('file-input').click()">📂 Load</button>
    <button class="btn gold" onclick="exportWAV()">⬇ WAV</button>
    <input type="file" id="file-input" accept="audio/*" style="display:none" onchange="loadFile(event)">
  </div>
</div>

<div class="view-tabs">
  <div class="vtab active" data-view="chop">✂️ Chop</div>
  <div class="vtab" data-view="stretch">⏩ Stretch</div>
  <div class="vtab" data-view="stems">🎚️ Stems</div>
  <div class="vtab" data-view="pads">🥁 Pads</div>
  <div class="vtab" data-view="fx">🔊 FX</div>
</div>

<div class="content" id="content">

<!-- DROP ZONE (shown when no file loaded) -->
<div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
  <div class="dz-icon">🎵</div>
  <h3>Drop a sample here</h3>
  <p>MP3, WAV, AIFF, FLAC, OGG supported<br>Or click to browse files</p>
</div>

<!-- WAVEFORM (hidden until file loaded) -->
<div class="waveform-wrap" id="waveform-wrap" style="display:none">
  <div class="wform-header">
    <span class="fname" id="file-name">No file loaded</span>
    <button class="btn" onclick="togglePlay()">▶</button>
    <button class="btn" onclick="stopAudio()">⏹</button>
  </div>
  <div class="wform-canvas" id="wform-canvas">
    <canvas id="wform" height="120"></canvas>
    <div class="wform-playhead" id="playhead"></div>
    <div class="wform-selection" id="selection" style="display:none"></div>
  </div>
  <div class="wform-controls">
    <button class="btn" onclick="sliceAuto(8)">Slice 8</button>
    <button class="btn" onclick="sliceAuto(16)">Slice 16</button>
    <button class="btn" onclick="sliceAuto(32)">Slice 32</button>
    <button class="btn" onclick="detectBPM()">🎯 BPM</button>
    <button class="btn" onclick="clearSlices()">Clear</button>
    <span id="bpm-info" style="font-size:12px;color:var(--gold);padding:7px 0;margin-left:4px;font-weight:700"></span>
  </div>
</div>

<!-- INFO ROW -->
<div class="info-row" id="info-row" style="display:none">
  <div class="info-box"><div class="iv" id="info-bpm">—</div><div class="il">BPM</div></div>
  <div class="info-box"><div class="iv" id="info-key">—</div><div class="il">Key</div></div>
  <div class="info-box"><div class="iv" id="info-len">—</div><div class="il">Length</div></div>
  <div class="info-box"><div class="iv" id="info-slices">0</div><div class="il">Slices</div></div>
</div>

<!-- KNOBS (shown once file loaded) -->
<div class="knobs-section" id="knobs-section" style="display:none">
  <h4>Sample Controls</h4>
  <div class="knobs-row" id="knobs-row"></div>
</div>

<!-- SLICE PADS (shown once sliced) -->
<div id="slice-section" style="display:none">
  <div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <h4 style="font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;">Slice Pads</h4>
      <span id="slice-count" style="font-size:12px;color:var(--dim)"></span>
    </div>
    <div class="slice-grid" id="slice-grid"></div>
  </div>
</div>

</div><!-- /content -->

<!-- STRETCH VIEW (hidden) -->
<div id="stretch-content" style="display:none;padding:12px;display:flex;flex-direction:column;gap:12px;">
  <div class="pt-section">
    <h4>Pitch & Time Stretch</h4>
    <div class="slider-row">
      <label>Pitch Shift</label>
      <input type="range" min="-24" max="24" value="0" id="pitch-sl" oninput="updatePitch(this.value)">
      <span class="sv" id="pitch-val">0 st</span>
    </div>
    <div class="slider-row">
      <label>Time Stretch</label>
      <input type="range" min="25" max="400" value="100" id="stretch-sl" oninput="updateStretch(this.value)">
      <span class="sv" id="stretch-val">100%</span>
    </div>
    <div class="slider-row">
      <label>Formant</label>
      <input type="range" min="-12" max="12" value="0" id="formant-sl" oninput="updateFormant(this.value)">
      <span class="sv" id="formant-val">0 st</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn green" onclick="applyPitchStretch()">✓ Apply</button>
      <button class="btn" onclick="resetPitchStretch()">↩ Reset</button>
    </div>
  </div>
</div>

<script>
let audioCtx = null, audioBuffer = null, sourceNode = null;
let slices = [], playheadInterval = null;
let startTime = 0, isPlaying = false;

const KNOB_DEFS = [
  {label:'Volume', min:0, max:100, val:80, unit:'%'},
  {label:'Attack', min:0, max:100, val:5, unit:'ms'},
  {label:'Release', min:0, max:100, val:30, unit:'ms'},
  {label:'Filter', min:20, max:100, val:80, unit:'%'},
  {label:'Reverb', min:0, max:100, val:20, unit:'%'},
  {label:'Pan', min:-50, max:50, val:0, unit:''},
  {label:'Pitch', min:-24, max:24, val:0, unit:'st'},
  {label:'Tune', min:-100, max:100, val:0, unit:'c'},
];

function ac(){ if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

// ============== FILE LOADING ==============
async function loadFile(e){
  const file = e.target.files[0]; if(!file) return;
  ac().resume();
  document.getElementById('file-name').textContent = file.name;
  const buf = await file.arrayBuffer();
  audioBuffer = await ac().decodeAudioData(buf);
  document.getElementById('drop-zone').style.display='none';
  document.getElementById('waveform-wrap').style.display='block';
  document.getElementById('info-row').style.display='grid';
  document.getElementById('knobs-section').style.display='block';
  document.getElementById('info-len').textContent = audioBuffer.duration.toFixed(1)+'s';
  drawWaveform(); buildKnobs(); detectBPM();
}

// Drag & Drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop', e=>{
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if(f){ document.getElementById('file-input').files = e.dataTransfer.files; loadFile({target:{files:[f]}}); }
});

// ============== WAVEFORM ==============
function drawWaveform(){
  const canvas = document.getElementById('wform');
  canvas.width = canvas.parentElement.offsetWidth || 600;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = 120;
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  const data = audioBuffer.getChannelData(0);
  const step = Math.floor(data.length/W);
  ctx.strokeStyle = 'rgba(212,160,60,.8)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for(let i=0;i<W;i++){
    let max=0;
    for(let j=i*step;j<(i+1)*step && j<data.length;j++) max=Math.max(max,Math.abs(data[j]));
    const y = H/2 - max*(H/2-4);
    const y2 = H/2 + max*(H/2-4);
    if(i===0) ctx.moveTo(i,H/2); else { ctx.moveTo(i,y); ctx.lineTo(i,y2); }
  }
  ctx.stroke();
  // Draw slice markers
  slices.forEach((sl,i)=>{
    const x = (sl.start/audioBuffer.duration)*W;
    ctx.strokeStyle = i===0?'transparent':'rgba(34,211,238,.8)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    ctx.fillStyle='rgba(34,211,238,.8)'; ctx.font='9px monospace';
    ctx.fillText(i+1, x+2, 12);
  });
}

// ============== PLAYBACK ==============
function togglePlay(){
  if(isPlaying){ stopAudio(); return; }
  if(!audioBuffer) return;
  ac().resume();
  sourceNode = ac().createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(ac().destination);
  startTime = ac().currentTime;
  sourceNode.start();
  isPlaying = true;
  playheadInterval = setInterval(()=>{
    const t = (ac().currentTime - startTime) / audioBuffer.duration;
    const W = document.getElementById('wform').width;
    document.getElementById('playhead').style.left = (t*W)+'px';
    if(t>=1) stopAudio();
  }, 50);
}

function stopAudio(){
  try{ sourceNode?.stop(); }catch(e){}
  isPlaying=false; clearInterval(playheadInterval);
  document.getElementById('playhead').style.left='0px';
}

function playSlice(idx){
  if(!audioBuffer) return;
  const sl = slices[idx]; if(!sl) return;
  ac().resume();
  const src = ac().createBufferSource();
  src.buffer = audioBuffer;
  src.connect(ac().destination);
  src.start(0, sl.start, sl.end - sl.start);
  const pad = document.querySelector(`.slice-pad[data-idx="${idx}"]`);
  if(pad){ pad.classList.add('hit'); setTimeout(()=>pad.classList.remove('hit'),150); }
  navigator.vibrate?.(6);
}

// ============== SLICING ==============
function sliceAuto(count){
  if(!audioBuffer) return;
  const dur = audioBuffer.duration;
  slices = Array.from({length:count},(_,i)=>({start:(i/count)*dur, end:((i+1)/count)*dur}));
  document.getElementById('info-slices').textContent = count;
  document.getElementById('slice-count').textContent = count+' slices';
  buildSlicePads(); drawWaveform();
  document.getElementById('slice-section').style.display='block';
}

function clearSlices(){ slices=[]; document.getElementById('info-slices').textContent='0'; document.getElementById('slice-section').style.display='none'; drawWaveform(); }

function buildSlicePads(){
  const grid = document.getElementById('slice-grid');
  grid.innerHTML = slices.map((sl,i)=>`
    <div class="slice-pad" data-idx="${i}" onclick="playSlice(${i})">
      <div class="sp-num">${i+1}</div>
      <div class="sp-label">Slice ${i+1}</div>
      <div class="sp-time">${sl.start.toFixed(2)}s</div>
    </div>
  `).join('');
}

// ============== BPM DETECTION ==============
function detectBPM(){
  if(!audioBuffer){ document.getElementById('bpm-info').textContent='Load a file first'; return; }
  const data = audioBuffer.getChannelData(0);
  const sr = audioBuffer.sampleRate;
  const frameSize = 1024, hopSize = 512;
  const energies = [];
  for(let i=0;i<data.length-frameSize;i+=hopSize){
    let e=0; for(let j=0;j<frameSize;j++) e+=data[i+j]**2;
    energies.push(e/frameSize);
  }
  // Find peaks
  const threshold = energies.reduce((a,b)=>a+b,0)/energies.length * 1.5;
  const peaks = [];
  for(let i=1;i<energies.length-1;i++){
    if(energies[i]>threshold && energies[i]>energies[i-1] && energies[i]>energies[i+1]) peaks.push(i);
  }
  if(peaks.length>2){
    const diffs = peaks.slice(1).map((p,i)=>p-peaks[i]);
    const avg = diffs.reduce((a,b)=>a+b,0)/diffs.length;
    const bpmEst = Math.round(60/(avg*hopSize/sr));
    const bpm = bpmEst > 200 ? bpmEst/2 : bpmEst < 60 ? bpmEst*2 : bpmEst;
    document.getElementById('bpm-info').textContent = bpm+' BPM';
    document.getElementById('info-bpm').textContent = bpm;
  } else {
    document.getElementById('bpm-info').textContent = 'BPM unknown';
  }
}

// ============== KNOBS ==============
function buildKnobs(){
  const row = document.getElementById('knobs-row');
  row.innerHTML = KNOB_DEFS.map((k,i)=>`
    <div class="knob-wrap">
      <div class="knob" id="knob-${i}" data-idx="${i}" data-val="${k.val}">
        <div class="knob-inner" style="transform:translate(-50%,0) rotate(${valToAngle(k.val,k.min,k.max)}deg)"></div>
      </div>
      <div class="knob-label">${k.label}</div>
      <div class="knob-val" id="kv-${i}">${k.val}${k.unit}</div>
    </div>
  `).join('');
  // Drag logic
  row.querySelectorAll('.knob').forEach(knob => {
    let startY=0, startVal=0;
    const def = KNOB_DEFS[parseInt(knob.dataset.idx)];
    const onStart = (clientY) => { startY=clientY; startVal=parseInt(knob.dataset.val); };
    const onMove = (clientY) => {
      const delta = (startY-clientY)*0.5;
      const newVal = Math.max(def.min, Math.min(def.max, startVal+delta));
      knob.dataset.val = newVal;
      knob.querySelector('.knob-inner').style.transform = `translate(-50%,0) rotate(${valToAngle(newVal,def.min,def.max)}deg)`;
      document.getElementById(`kv-${knob.dataset.idx}`).textContent = Math.round(newVal)+def.unit;
    };
    knob.addEventListener('mousedown', e=>{onStart(e.clientY); const mm=f=>onMove(f.clientY); const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}; document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);});
    knob.addEventListener('touchstart', e=>{onStart(e.touches[0].clientY);},{passive:true});
    knob.addEventListener('touchmove', e=>{onMove(e.touches[0].clientY);},{passive:true});
  });
}

function valToAngle(val,min,max){ return -135 + ((val-min)/(max-min))*270; }

// ============== PITCH/TIME CONTROLS ==============
function updatePitch(v){ document.getElementById('pitch-val').textContent = v+' st'; }
function updateStretch(v){ document.getElementById('stretch-val').textContent = v+'%'; }
function updateFormant(v){ document.getElementById('formant-val').textContent = v+' st'; }
function applyPitchStretch(){ alert('✅ Applied — Connect to GOAT server for offline processing'); }
function resetPitchStretch(){
  document.getElementById('pitch-sl').value=0; document.getElementById('pitch-val').textContent='0 st';
  document.getElementById('stretch-sl').value=100; document.getElementById('stretch-val').textContent='100%';
  document.getElementById('formant-sl').value=0; document.getElementById('formant-val').textContent='0 st';
}

// ============== WAV EXPORT ==============
function exportWAV(){
  if(!audioBuffer){ alert('Load a sample first'); return; }
  const numCh=audioBuffer.numberOfChannels, sr=audioBuffer.sampleRate, len=audioBuffer.length;
  const buf=new ArrayBuffer(44+len*2), view=new DataView(buf);
  const w=(o,v)=>view.setUint32(o,v,true), ws=(o,v)=>view.setUint16(o,v,true);
  view.setUint8(0,82); view.setUint8(1,73); view.setUint8(2,70); view.setUint8(3,70);
  w(4,36+len*2); view.setUint8(8,87); view.setUint8(9,65); view.setUint8(10,86); view.setUint8(11,69);
  view.setUint8(12,102); view.setUint8(13,109); view.setUint8(14,116); view.setUint8(15,32);
  w(16,16); ws(20,1); ws(22,1); w(24,sr); w(28,sr*2); ws(32,2); ws(34,16);

document.querySelectorAll('.vtab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('active'));

    if(t.dataset.view==='stretch'){ content.style.display='none'; stretch.style.display='flex'; }
