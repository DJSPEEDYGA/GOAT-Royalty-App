<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sir Codex - GOAT Royalty Knowledge Keeper AI</title>
    <link rel="stylesheet" href="../css/goat-theme.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #4a4a6e, #2a2a4e);
            min-height: 100vh;
            color: #fff;
            margin: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(79, 70, 229, 0.2));
            border-radius: 20px;
            margin-bottom: 30px;
            border: 2px solid rgba(147, 51, 234, 0.3);
        }
        .avatar {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 150px;
            margin: 0 auto 20px;
            border: 5px solid rgba(147, 51, 234, 0.5);
            box-shadow: 0 0 50px rgba(147, 51, 234, 0.5);
        }
        .name {
            font-size: 4em;
            font-weight: bold;
            margin: 0 0 20px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title { color: #9333ea; font-size: 2em; }
        .chat-interface {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(147, 51, 234, 0.3);
            margin-bottom: 30px;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .message { margin-bottom: 15px; padding: 15px; border-radius: 10px; max-width: 80%; }
        .message.codex {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(79, 70, 229, 0.2));
            border: 1px solid rgba(147, 51, 234, 0.3);
            margin-left: auto;
        }
        .message.user {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-area { display: flex; gap: 15px; }
        .input-area input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(147, 51, 234, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }
        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
<!-- Third-party script removed: local credential storage must stay private. -->
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">📜</div>
            <h1 class="name">Sir Codex</h1>
            <p class="title">The Knowledge Keeper • Wisdom Incarnate</p>
        </div>

        <div class="chat-interface">
            <h2>💬 Chat with Sir Codex</h2>
            <div class="chat-messages" id="chat-messages">
                <div class="message codex">
                    <div>Greetings, seeker of knowledge. I am Sir Codex, keeper of all wisdom within the GOAT Royalty empire. What knowledge do you seek today?</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Seek wisdom from Sir Codex...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <a href="../money-penny-codex.html" class="back-link">← Back to AI Codex</a>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');

        function addMessage(message, isCodex = false) {
            const div = document.createElement('div');
            div.className = `message ${isCodex ? 'codex' : 'user'}`;
            div.innerHTML = `<div>${message}</div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, false);
            messageInput.value = '';

            try {
                addMessage('Sir Codex is consulting the archives...', true);

                const response = await fetch('http://localhost:11435/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'llama3.1:8b',
                        prompt: `You are Sir Codex, the wise and knowledgeable AI assistant of GOAT Royalty. You speak with wisdom, precision, and authority on all matters. You are scholarly and eloquent. Respond to: ${message}`,
                        stream: false
                    })
                });

                const data = await response.json();
                chatMessages.lastChild.remove();
                addMessage(data.response, true);

            } catch (error) {
                chatMessages.lastChild.remove();
                addMessage("Ensure Ollama is running on localhost:11435", true);
            }
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
