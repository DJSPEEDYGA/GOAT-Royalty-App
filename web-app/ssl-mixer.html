<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GOAT SSL 9000 Mixer — 32 Channel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111928;--bg4:#1a2336;
  --border:rgba(212,160,60,0.18);--gold:#d4a03c;--gold2:#f0c040;
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --cyan:#00d4ff;--orange:#f39c12;--pink:#e91e8c;
  --text:#f0ece4;--sub:#7a7060;
  --ssl-body:#1a2236;--ssl-strip:#141c2a;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:11px}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:var(--gold)}
.tb-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.tb-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--gold)}
.spacer{flex:1}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
/* CONSOLE AREA */
#console-wrap{flex:1;overflow-x:auto;overflow-y:hidden;background:var(--bg);display:flex;flex-direction:column}
#console-header{height:24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:10px;flex-shrink:0}
#console-body{flex:1;overflow-x:auto;overflow-y:auto;display:flex;align-items:flex-start;padding:6px;gap:0}
/* CHANNEL STRIP */
.group-block{display:flex;gap:0;margin-right:6px;border-radius:6px;overflow:hidden}
.ch-strip{width:54px;background:var(--ssl-strip);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;align-items:center;padding:4px 3px;gap:2px;flex-shrink:0;position:relative}
.ch-strip:hover{background:#161e2f}
.ch-strip.selected{outline:2px solid var(--gold)}
.ch-label{font-size:8px;font-weight:700;color:var(--sub);text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
.ch-num{font-size:8px;color:rgba(255,255,255,0.2);text-align:center}
.group-label{font-size:8px;font-weight:700;letter-spacing:1px;writing-mode:vertical-rl;text-orientation:mixed;padding:4px 2px;color:#fff;border-radius:4px 0 0 4px;min-height:60px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* SECTION HEADER */
.sec-lbl{font-size:7px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;text-align:center;width:100%;margin-bottom:1px;margin-top:3px;border-top:1px solid rgba(255,255,255,0.06);padding-top:2px}
/* HPF/LPF */
.filter-row{display:flex;gap:2px;align-items:center;justify-content:center;width:100%}
.filter-btn{width:20px;height:14px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.filter-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.1)}
/* EQ SECTION */
.eq-row{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;width:100%}
/* COMP SECTION */
.comp-row{display:flex;gap:3px;justify-content:center;width:100%}
/* AUX SECTION */
.aux-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%}
/* SMR BUTTONS */
.smr-row{display:flex;gap:2px;justify-content:center;width:100%}
.smr-btn{width:16px;height:16px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.smr-btn.s.on{border-color:var(--gold);color:var(--gold);background:rgba(212,160,60,.15)}
.smr-btn.m.on{border-color:var(--orange);color:var(--orange);background:rgba(243,156,18,.15)}
.smr-btn.r.on{border-color:var(--red);color:var(--red);background:rgba(231,76,60,.15)}
/* METERS */
.meter-pair{display:flex;gap:1px;height:40px}
.meter-bar{width:7px;border-radius:2px;background:var(--bg4);position:relative;overflow:hidden}
.meter-fill{width:100%;background:linear-gradient(to top,#2ecc71,#f1c40f 70%,#e74c3c 90%);position:absolute;bottom:0;border-radius:2px;transition:height .05s}
/* FADER */
.fader-wrap{width:40px;height:80px;position:relative;cursor:ns-resize;flex-shrink:0;margin:2px 0}
.fader-track{position:absolute;left:50%;transform:translateX(-50%);width:4px;height:100%;background:var(--bg4);border-radius:2px}
.fader-fill{position:absolute;left:50%;transform:translateX(-50%);width:4px;bottom:0;border-radius:2px;background:var(--blue)}
.fader-cap{position:absolute;left:50%;transform:translateX(-50%);width:26px;height:10px;background:#c8c0b0;border-radius:2px;cursor:ns-resize;box-shadow:0 1px 4px rgba(0,0,0,0.5)}
.fader-lbl{font-size:8px;color:var(--sub);text-align:center;margin-top:2px}
/* PAN */
.pan-wrap{width:100%;display:flex;justify-content:center}
/* GR METER */
.gr-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;width:100%;margin:1px 0}
.gr-fill{height:100%;background:var(--green);border-radius:2px;transition:width .08s}
/* RIGHT MASTER */
#master-panel{width:280px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px;gap:10px}
.mp-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mp-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px}
.master-meters{display:flex;gap:4px;height:120px;align-items:flex-end}
.master-meter{width:20px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.master-fill{width:100%;background:linear-gradient(to top,#2ecc71,#f1c40f 65%,#e74c3c 88%);position:absolute;bottom:0;border-radius:3px;transition:height .06s}
.master-fader-wrap{flex:1;height:120px;position:relative;cursor:ns-resize}
.master-fader-track{position:absolute;left:50%;transform:translateX(-50%);width:6px;height:100%;background:var(--bg4);border-radius:3px}
.master-fader-fill{position:absolute;left:50%;transform:translateX(-50%);width:6px;bottom:0;border-radius:3px;background:var(--gold)}
.master-fader-cap{position:absolute;left:50%;transform:translateX(-50%);width:36px;height:14px;background:#c8c0b0;border-radius:3px;cursor:ns-resize;box-shadow:0 2px 6px rgba(0,0,0,.6)}
.stat-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px}
.stat-val{color:var(--cyan);font-weight:700}
.bus-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.bus-btn{padding:5px;border-radius:4px;border:1px solid var(--border);background:var(--bg4);color:var(--sub);cursor:pointer;font-size:9px;text-align:center;transition:all .2s;font-family:inherit}
.bus-btn:hover,.bus-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,160,60,.1)}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <span class="logo">🐐 SSL 9000</span>
    <span style="font-size:10px;color:var(--sub)">32-Channel Console</span>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="autoAll()">⚡ Auto All</button>
    <button class="tb-btn" onclick="soloAll()">S ALL</button>
    <button class="tb-btn" onclick="muteAll()">M ALL</button>
    <button class="tb-btn" onclick="clearSolo()">CLR SOLO</button>
    <div class="spacer"></div>
    <a href="studio.html"><button class="tb-btn">DAW</button></a>
    <a href="vocal-studio.html"><button class="tb-btn">Vocal</button></a>
    <a href="powerhouse.html"><button class="tb-btn">⬅ Home</button></a>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- CONSOLE -->
    <div id="console-wrap">
      <div id="console-header">
        <span style="font-size:9px;color:var(--sub)">SSL 9000 K Console  •  48kHz / 32-bit Float  •  64 Channels Available</span>
        <div class="spacer"></div>
        <span id="lufs-disp" style="font-size:10px;color:var(--cyan)">-14.2 LUFS</span>
        <span id="dbtp-disp" style="font-size:10px;color:var(--gold);margin-left:8px">-1.8 dBTP</span>
      </div>
      <div id="console-body"></div>
    </div>

    <!-- MASTER PANEL -->
    <div id="master-panel">
      <div class="mp-card">
        <div class="mp-title">📊 Master Output</div>
        <div class="master-meters" id="masterMeters">
          <div class="master-meter" style="height:120px"><div class="master-fill" id="mML" style="height:70%"></div></div>
          <div class="master-meter" style="height:120px"><div class="master-fill" id="mMR" style="height:68%"></div></div>
          <div class="master-fader-wrap" id="masterFader">
            <div class="master-fader-track"></div>
            <div class="master-fader-fill" id="masterFaderFill" style="height:85%"></div>
            <div class="master-fader-cap" id="masterFaderCap" style="bottom:calc(85% - 7px)"></div>
          </div>
        </div>
        <div style="margin-top:8px">
          <div class="stat-row"><span>L Peak</span><span class="stat-val" id="lPeak">-1.2 dB</span></div>
          <div class="stat-row"><span>R Peak</span><span class="stat-val" id="rPeak">-1.4 dB</span></div>
          <div class="stat-row"><span>LUFS</span><span class="stat-val" id="lufsVal">-14.2</span></div>
          <div class="stat-row"><span>dBTP</span><span class="stat-val" id="dbtpVal">-1.8</span></div>
        </div>
      </div>

      <div class="mp-card">
        <div class="mp-title">🎛 Master EQ</div>
        <canvas id="masterEQ" width="240" height="80"></canvas>
      </div>

      <div class="mp-card">
        <div class="mp-title">🔀 Bus Matrix</div>
        <div class="bus-grid" id="busGrid"></div>
      </div>

      <div class="mp-card">
        <div class="mp-title">⚙ Master Inserts</div>
        <div style="display:flex;flex-direction:column;gap:4px" id="masterInserts"></div>
      </div>

      <div class="mp-card">
        <div class="mp-title">📤 Export</div>
        <button class="tb-btn" style="width:100%;margin-bottom:4px;text-align:center" onclick="openExport()">📤 Export Mix</button>
        <button class="tb-btn" style="width:100%;text-align:center">🎛 Save Recall</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──
const GROUPS = [
  {label:'DRUMS', color:'#e74c3c', names:['Kick','Snare','HH-C','HH-O','Perc','Tom L','Tom H','Ride']},
  {label:'BASS',  color:'#f39c12', names:['808','Bass DI','Bass Amp','Sub']},
  {label:'SYNTHS',color:'#3498db', names:['Lead 1','Lead 2','Pad','Arp','Chord','Stab']},
  {label:'VOCALS',color:'#9b59b6', names:['Vox Ld','Vox Alt','BG 1','BG 2','Ad-lib','Vox FX']},
  {label:'FX/BUS',color:'#1abc9c', names:['FX 1','FX 2','Bus A','Bus B','Aux R','Aux L','Drum Bus','Mix Bus']},
];

let channels = [];
let soloMode = false;

function makeChannels(names, colorIdx, groupLabel){
  return names.map((name, i)=>({
    name, groupLabel, color: GROUPS[colorIdx].color,
    vol:0.75+Math.random()*0.2, pan:(Math.random()-0.5)*0.4,
    solo:false, mute:false, rec:false,
    hpf:false, lpf:false,
    eq:{hf:0.3, hmf:0.5, lmf:0.5, lf:0.4},
    comp:{thr:0.6, rat:0.4, att:0.5},
    aux:[0.3,0.2,0.1,0.0],
    gr:0, levelL:0.6+Math.random()*0.3, levelR:0.6+Math.random()*0.3,
  }));
}

GROUPS.forEach((g,gi)=>{
  channels.push(...makeChannels(g.names, gi, g.label));
});

// ── CANVAS KNOB ENGINE ──
function mkKnob(size, val, color){
  const cv = document.createElement('canvas');
  cv.width=size; cv.height=size;
  cv.style.cursor='ns-resize';
  cv.style.flexShrink='0';
  drawKnob(cv, val, color, size);
  let drag=false, startY=0, startV=val;
  cv.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startV=parseFloat(cv.dataset.val||val);e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const nv=Math.max(0,Math.min(1,startV-(e.clientY-startY)/80));
    cv.dataset.val=nv;
    drawKnob(cv,nv,color,size);
  });
  document.addEventListener('mouseup',()=>drag=false);
  cv.dataset.val=val;
  return cv;
}

function drawKnob(cv, val, color, size){
  const ctx=cv.getContext('2d');
  const cx=size/2, cy=size/2, r=size/2-2;
  ctx.clearRect(0,0,size,size);
  // body
  const g2=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,1,cx,cy,r);
  g2.addColorStop(0,'#2a3448');g2.addColorStop(1,'#111928');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.stroke();
  // track
  ctx.beginPath();ctx.arc(cx,cy,r-2,-2.4,0.7);ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=3;ctx.stroke();
  // value arc
  const angle=-2.4+val*3.1;
  ctx.beginPath();ctx.arc(cx,cy,r-2,-2.4,angle);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  // pointer line
  const dx=cx+(r-5)*Math.cos(angle), dy=cy+(r-5)*Math.sin(angle);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(dx,dy);ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
}

// ── FADER DRAG ──
function initFaderDrag(ch, faderEl, fillEl, capEl, labelEl){
  let drag=false, startY=0, startV=ch.vol;
  faderEl.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startV=ch.vol;e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    ch.vol=Math.max(0,Math.min(1,startV-(e.clientY-startY)/80));
    const pct=ch.vol*100;
    fillEl.style.height=pct+'%';
    capEl.style.bottom='calc('+pct+'% - 5px)';
    if(labelEl)labelEl.textContent=(ch.vol>=0.95?'0':(ch.vol>=0.5?(-20*(1-ch.vol)).toFixed(1):'∞'))+' dB';
  });
  document.addEventListener('mouseup',()=>drag=false);
}

// ── BUILD CONSOLE ──
function buildConsole(){
  const body = document.getElementById('console-body');
  body.innerHTML='';
  GROUPS.forEach((grp, gi)=>{
    const groupChannels = channels.filter(c=>c.groupLabel===grp.label);
    const block = document.createElement('div');
    block.className='group-block';
    // group label bar
    const glabel = document.createElement('div');
    glabel.className='group-label';
    glabel.style.background=hexA(grp.color,0.25);
    glabel.style.color=grp.color;
    glabel.textContent=grp.label;
    block.appendChild(glabel);
    groupChannels.forEach((ch, ci)=>{
      const strip=document.createElement('div');
      strip.className='ch-strip';
      strip.title=ch.name;
      strip.onclick=()=>{strip.classList.toggle('selected');}

      const idx=channels.indexOf(ch)+1;

      // channel number + name
      strip.innerHTML=`<div class="ch-num">${idx}</div>`;
      const nameLbl=document.createElement('div');nameLbl.className='ch-label';nameLbl.textContent=ch.name;nameLbl.style.color=ch.color;strip.appendChild(nameLbl);

      // HPF/LPF
      const fr=document.createElement('div');fr.className='filter-row';
      const hpfBtn=document.createElement('button');hpfBtn.className='filter-btn'+(ch.hpf?' on':'');hpfBtn.textContent='HPF';
      hpfBtn.onclick=e=>{e.stopPropagation();ch.hpf=!ch.hpf;hpfBtn.classList.toggle('on',ch.hpf);};
      const lpfBtn=document.createElement('button');lpfBtn.className='filter-btn'+(ch.lpf?' on':'');lpfBtn.textContent='LPF';
      lpfBtn.onclick=e=>{e.stopPropagation();ch.lpf=!ch.lpf;lpfBtn.classList.toggle('on',ch.lpf);};
      fr.append(hpfBtn,lpfBtn);strip.appendChild(fr);

      // EQ section
      const eqLbl=document.createElement('div');eqLbl.className='sec-lbl';eqLbl.textContent='EQ';strip.appendChild(eqLbl);
      const eqRow=document.createElement('div');eqRow.className='eq-row';
      [{val:ch.eq.hf,c:'#e74c3c'},{val:ch.eq.hmf,c:'#f39c12'},{val:ch.eq.lmf,c:'#3498db'},{val:ch.eq.lf,c:'#2ecc71'}].forEach(({val,c})=>{
        eqRow.appendChild(mkKnob(14,val,c));
      });
      strip.appendChild(eqRow);

      // COMP section
      const compLbl=document.createElement('div');compLbl.className='sec-lbl';compLbl.textContent='COMP';strip.appendChild(compLbl);
      const compRow=document.createElement('div');compRow.className='comp-row';
      [{val:ch.comp.thr,c:'#9b59b6'},{val:ch.comp.rat,c:'#e91e8c'},{val:ch.comp.att,c:'#1abc9c'}].forEach(({val,c})=>{
        compRow.appendChild(mkKnob(14,val,c));
      });
      strip.appendChild(compRow);

      // GR meter
      const grWrap=document.createElement('div');grWrap.className='gr-bar';
      const grFill=document.createElement('div');grFill.className='gr-fill';grFill.id='gr'+idx;
      grFill.style.width='0%';grWrap.appendChild(grFill);strip.appendChild(grWrap);

      // AUX section
      const auxLbl=document.createElement('div');auxLbl.className='sec-lbl';auxLbl.textContent='AUX';strip.appendChild(auxLbl);
      const auxGrid=document.createElement('div');auxGrid.className='aux-grid';
      ch.aux.forEach((v,ai)=>{auxGrid.appendChild(mkKnob(13,v,['#00d4ff','#f39c12','#9b59b6','#e91e8c'][ai]));});
      strip.appendChild(auxGrid);

      // PAN
      const panLbl=document.createElement('div');panLbl.className='sec-lbl';panLbl.textContent='PAN';strip.appendChild(panLbl);
      const panWrap=document.createElement('div');panWrap.className='pan-wrap';
      panWrap.appendChild(mkKnob(16,(ch.pan+1)/2,'#f0c040'));
      strip.appendChild(panWrap);

      // S M R buttons
      const smrRow=document.createElement('div');smrRow.className='smr-row';
      const sBtn=document.createElement('button');sBtn.className='smr-btn s'+(ch.solo?' on':'');sBtn.textContent='S';
      sBtn.onclick=e=>{e.stopPropagation();ch.solo=!ch.solo;sBtn.classList.toggle('on',ch.solo);};
      const mBtn=document.createElement('button');mBtn.className='smr-btn m'+(ch.mute?' on':'');mBtn.textContent='M';
      mBtn.onclick=e=>{e.stopPropagation();ch.mute=!ch.mute;mBtn.classList.toggle('on',ch.mute);};
      const rBtn=document.createElement('button');rBtn.className='smr-btn r'+(ch.rec?' on':'');rBtn.textContent='R';
      rBtn.onclick=e=>{e.stopPropagation();ch.rec=!ch.rec;rBtn.classList.toggle('on',ch.rec);};
      smrRow.append(sBtn,mBtn,rBtn);strip.appendChild(smrRow);

      // L/R meters
      const meterPair=document.createElement('div');meterPair.className='meter-pair';
      const mlBar=document.createElement('div');mlBar.className='meter-bar';
      const mlFill=document.createElement('div');mlFill.className='meter-fill';mlFill.id='ml'+idx;mlFill.style.height='60%';mlBar.appendChild(mlFill);
      const mrBar=document.createElement('div');mrBar.className='meter-bar';
      const mrFill=document.createElement('div');mrFill.className='meter-fill';mrFill.id='mr'+idx;mrFill.style.height='58%';mrBar.appendChild(mrFill);
      meterPair.append(mlBar,mrBar);strip.appendChild(meterPair);

      // Fader
      const faderWrap=document.createElement('div');faderWrap.className='fader-wrap';
      const faderTrack=document.createElement('div');faderTrack.className='fader-track';
      const faderFill=document.createElement('div');faderFill.className='fader-fill';
      const faderCap=document.createElement('div');faderCap.className='fader-cap';
      const pct=ch.vol*100;
      faderFill.style.height=pct+'%';faderCap.style.bottom='calc('+pct+'% - 5px)';
      faderWrap.append(faderTrack,faderFill,faderCap);
      const faderLbl=document.createElement('div');faderLbl.className='fader-lbl';faderLbl.id='fvol'+idx;faderLbl.textContent='0 dB';
      strip.appendChild(faderWrap);strip.appendChild(faderLbl);
      initFaderDrag(ch,faderWrap,faderFill,faderCap,faderLbl);

      block.appendChild(strip);
    });
    body.appendChild(block);
  });
}

// ── MASTER EQ ──
function drawMasterEQ(){
  const cv=document.getElementById('masterEQ');
  const ctx=cv.getContext('2d');const w=240,h=80;
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  // zero line
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
  // EQ curve (simulated 4-band)
  ctx.beginPath();
  for(let x=0;x<w;x++){
    const f=x/w;
    const y2=h/2-10*Math.sin(f*Math.PI*0.8)-6*Math.sin(f*Math.PI*2.5)+4*Math.sin(f*Math.PI*5);
    x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  }
  ctx.strokeStyle='#d4a03c';ctx.lineWidth=2;ctx.stroke();
  ctx.lineWidth=1;
  // fill
  ctx.lineTo(w,h/2);ctx.lineTo(0,h/2);ctx.closePath();
  ctx.fillStyle='rgba(212,160,60,0.08)';ctx.fill();
  // freq labels
  ['80','250','1k','4k','12k'].forEach((f,i)=>{
    const x=20+i*50;ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='7px monospace';ctx.fillText(f,x,h-3);
  });
}

// ── BUS GRID ──
function buildBusGrid(){
  const el=document.getElementById('busGrid');
  const buses=['Bus A','Bus B','Bus C','Bus D','Aux 1','Aux 2','FX Ret 1','FX Ret 2'];
  el.innerHTML=buses.map((b,i)=>`
    <button class="bus-btn ${i<4?'on':''}" onclick="this.classList.toggle('on')">${b}</button>
  `).join('');
}

// ── MASTER INSERTS ──
function buildMasterInserts(){
  const el=document.getElementById('masterInserts');
  const inserts=[
    {n:'Pro-Q 4',c:'#3498db',on:true},{n:'Pro-C 2',c:'#e74c3c',on:true},
    {n:'Pro-L 2',c:'#f1c40f',on:true},{n:'Ozone 11',c:'#9b59b6',on:true},
    {n:'Pultec EQP',c:'#1abc9c',on:false}
  ];
  el.innerHTML=inserts.map(p=>`
    <div style="display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--bg4);border-radius:4px;border:1px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:${p.on?p.c:'var(--sub)'};box-shadow:${p.on?'0 0 6px '+p.c:'none'}"></div>
      <span style="flex:1;font-size:10px">${p.n}</span>
      <span style="font-size:9px;color:${p.on?'var(--green)':'var(--sub)'}">${p.on?'ON':'OFF'}</span>
    </div>
  `).join('');
}

// ── METER ANIMATION ──
let meterAnimId=null;
function animMeters(){
  channels.forEach((ch,i)=>{
    const idx=i+1;
    const ml=document.getElementById('ml'+idx);
    const mr=document.getElementById('mr'+idx);
    const gr=document.getElementById('gr'+idx);
    if(!ml)return;
    const base=ch.mute?0:ch.vol;
    const lh=(base*(50+Math.random()*45));
    const rh=(base*(48+Math.random()*47));
    ml.style.height=Math.min(100,lh)+'%';
    mr.style.height=Math.min(100,rh)+'%';
    if(gr){
      const grPct=ch.comp.thr>0.3?Math.random()*30:0;
      gr.style.width=grPct+'%';
      gr.style.background=grPct>20?'var(--red)':'var(--green)';
    }
  });
  // master
  const lh=55+Math.random()*35, rh=53+Math.random()*37;
  const mml=document.getElementById('mML'), mmr=document.getElementById('mMR');
  if(mml)mml.style.height=lh+'%';
  if(mmr)mmr.style.height=rh+'%';
  const lPeak=(-1-Math.random()*2).toFixed(1);const rPeak=(-1.2-Math.random()*2).toFixed(1);
  document.getElementById('lPeak').textContent=lPeak+' dB';
  document.getElementById('rPeak').textContent=rPeak+' dB';
  document.getElementById('lufsVal').textContent=(-14-Math.random()).toFixed(1);
  document.getElementById('dbtpVal').textContent=(-1.5-Math.random()*1.5).toFixed(1);
  document.getElementById('lufs-disp').textContent=(-14-Math.random()).toFixed(1)+' LUFS';
  document.getElementById('dbtp-disp').textContent=(-1.5-Math.random()*1.5).toFixed(1)+' dBTP';
}

// ── UTILS ──
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function soloAll(){channels.forEach(c=>c.solo=true);buildConsole();}
function muteAll(){channels.forEach(c=>c.mute=true);buildConsole();}
function clearSolo(){channels.forEach(c=>{c.solo=false;c.mute=false;});buildConsole();}
function autoAll(){channels.forEach(c=>{c.hpf=true;c.comp.thr=0.6;});buildConsole();}
function openExport(){alert('Export Mix\n• WAV Stereo Mix\n• Stems (32 tracks)\n• Broadcast WAV\n• FLAC Lossless\n\n[Connect to export engine]');}

// ── INIT ──
function init(){
  buildConsole();
  drawMasterEQ();
  buildBusGrid();
  buildMasterInserts();
  setInterval(animMeters, 60);
  setInterval(drawMasterEQ, 3000);
}
window.addEventListener('DOMContentLoaded', init);
</script>
