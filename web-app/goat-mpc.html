<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>🥁 GOAT MPC — Beat Machine</title>
<link rel="stylesheet" href="css/goat-touch.css">
<style>
:root{--red:#c1121f;--gold:#ffd700;--black:#0a0a0a;--char:#1a1a1a;--gray:#2a2a2a;--cream:#f5f5dc;--green:#22c55e;--cyan:#06b6d4;--purple:#a855f7;--orange:#f97316;--silver:#9ca3af;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
body{background:var(--black);color:var(--cream);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;touch-action:manipulation;}

.page{padding:70px 10px 90px;min-height:100vh;display:flex;flex-direction:column;gap:12px;}
.topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(10,10,10,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,215,0,.25);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:100;}
.topbar .brand{font-size:18px;font-weight:900;color:var(--gold);letter-spacing:1px;}
.topbar .spacer{flex:1;}
.chip{padding:5px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;font-size:11px;font-weight:700;color:var(--silver);}
.topbtn{min-height:40px;padding:6px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--cream);font-size:13px;font-weight:700;cursor:pointer;}
.topbtn:active{background:rgba(255,255,255,.15);}

/* ── SECTION ── */
.sec{background:var(--char);border-radius:16px;padding:12px;border:1px solid rgba(255,255,255,.06);}
.sec-title{font-size:11px;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}

/* ── BPM BAR ── */
.bpm-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.bpm-num{font-size:48px;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums;min-width:110px;text-align:center;}
.smBtn{min-height:48px;min-width:48px;padding:6px 12px;background:var(--gray);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--cream);font-size:14px;font-weight:800;cursor:pointer;}
.smBtn:active{filter:brightness(1.4);transform:scale(.95);}
.smBtn.red{background:linear-gradient(135deg,#c1121f,#780000);border-color:var(--red);}
.smBtn.gold{background:linear-gradient(135deg,#ffd700,#b8860b);color:var(--black);border-color:var(--gold);}
.smBtn.green{background:linear-gradient(135deg,#22c55e,#059669);border-color:var(--green);}

/* ── 16-PAD GRID ── */
.pad-grid-16{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.mpad{aspect-ratio:1;border-radius:14px;background:linear-gradient(145deg,#2a2a2a,#1a1a1a);border:2px solid rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;touch-action:none;position:relative;overflow:hidden;}
.mpad:active,.mpad.hit{transform:scale(.93);border-color:var(--gold);box-shadow:0 0 20px rgba(193,18,31,.7);}
.mpad.loaded{border-color:rgba(255,215,0,.35);}
.mpad.playing{box-shadow:0 0 24px var(--gold);}
.mpad .pn{font-size:20px;font-weight:900;color:var(--gold);}
.mpad .pl{font-size:10px;font-weight:700;color:var(--silver);text-transform:uppercase;letter-spacing:.5px;}
.mpad .pbar{position:absolute;bottom:0;left:0;height:3px;background:var(--red);transition:width .05s;}
.mpad .color-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;}

/* ── STEP SEQUENCER ── */
.seq-container{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.seq-table{border-collapse:collapse;min-width:640px;width:100%;}
.seq-label-cell{padding:4px 8px;font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;min-width:56px;}
.seq-step{width:100%;aspect-ratio:1;min-height:28px;background:#1a1a1a;border:1px solid rgba(255,255,255,.06);border-radius:4px;cursor:pointer;position:relative;}
.seq-step.on{background:var(--red);border-color:var(--gold);box-shadow:0 0 6px rgba(193,18,31,.5);}
.seq-step.cur{outline:2px solid var(--gold);outline-offset:-2px;}
.beat-num{font-size:8px;color:rgba(255,215,0,.4);text-align:center;padding:2px 0;}

/* ── PIANO ROLL ── */
.piano-roll-wrap{background:var(--char);border-radius:14px;overflow:hidden;position:relative;}
.pr-header{height:24px;background:#111;display:flex;border-bottom:1px solid rgba(255,255,255,.08);}
.pr-keys-col{width:56px;background:#111;flex-shrink:0;}
.pr-grid{overflow:auto;position:relative;-webkit-overflow-scrolling:touch;}
.pr-row{display:flex;height:28px;border-bottom:1px solid rgba(255,255,255,.04);}
.pr-key{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:9px;font-weight:700;border-right:1px solid rgba(255,255,255,.1);}
.pr-key.white{background:#1a1a1a;color:var(--silver);}
.pr-key.black{background:#111;color:#555;}
.pr-cell{width:32px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.04);cursor:pointer;}
.pr-cell.on{background:var(--red);border-radius:2px;}
.pr-cell.beat{border-right-color:rgba(255,215,0,.2);}

/* ── PATTERN CHAIN ── */
.pattern-chain{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px;}
.pat-slot{min-width:56px;height:56px;background:var(--gray);border:2px solid rgba(255,255,255,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--silver);cursor:pointer;flex-shrink:0;flex-direction:column;gap:2px;}
.pat-slot.active{background:linear-gradient(135deg,#c1121f,#780000);border-color:var(--gold);color:var(--gold);}
.pat-slot.has{border-color:rgba(255,215,0,.4);color:var(--cream);}
.pat-slot .ps-num{font-size:18px;}
.pat-slot .ps-label{font-size:8px;text-transform:uppercase;letter-spacing:.5px;}

/* ── BOTTOM NAV ── */
.t-tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.98);backdrop-filter:blur(20px);border-top:1px solid rgba(255,215,0,.2);display:flex;justify-content:space-around;padding:8px 0;z-index:100;}
.t-tab{flex:1;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--silver);text-decoration:none;}
.t-tab .ic{font-size:22px;}
.t-tab .lb{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.t-tab.active{color:var(--gold);}

/* ── MODE TABS ── */
.view-tabs{display:flex;gap:6px;background:var(--char);padding:6px;border-radius:14px;}
.view-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:800;border-radius:10px;cursor:pointer;color:var(--silver);text-transform:uppercase;}
.view-tab.active{background:linear-gradient(135deg,#c1121f,#780000);color:white;}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

  <!-- VIEW TABS -->
  <div class="view-tabs">

    </div>

        <button class="smBtn" onclick="loadProject()">📂 LOAD PROJECT</button>

<script>
// ============== AUDIO ENGINE ==============
let ac = null;
function getAC(){ if(!ac){ ac=new(window.AudioContext||window.webkitAudioContext)(); } if(ac.state==='suspended') ac.resume(); return ac; }

const KIT_DEFS = {
  trap:  [{n:'KICK',s:'kick'},{n:'SNARE',s:'snare'},{n:'CLAP',s:'clap'},{n:'HAT',s:'hat'},
          {n:'OH',s:'hat'},{n:'808A',s:'808'},{n:'808B',s:'808'},{n:'RIM',s:'snare'},
          {n:'PERC1',s:'hat'},{n:'PERC2',s:'hat'},{n:'CRASH',s:'hat'},{n:'RIDE',s:'hat'},
          {n:'VOX1',s:'snare'},{n:'VOX2',s:'clap'},{n:'FX UP',s:'hat'},{n:'FX DN',s:'808'}],
  hiphop:[{n:'KICK',s:'kick'},{n:'SNARE',s:'snare'},{n:'CLAP',s:'clap'},{n:'HAT',s:'hat'},
          {n:'RIM',s:'snare'},{n:'BASS',s:'808'},{n:'SUB',s:'808'},{n:'SHAKER',s:'hat'},
          {n:'CONGA',s:'snare'},{n:'BONGO',s:'snare'},{n:'CYM',s:'hat'},{n:'TAMB',s:'hat'},
          {n:'HIT',s:'clap'},{n:'ZAP',s:'hat'},{n:'SCRATCH',s:'snare'},{n:'LASER',s:'hat'}],
  drill: [{n:'KICK D',s:'kick'},{n:'SNARE',s:'snare'},{n:'CLAP',s:'clap'},{n:'HAT',s:'hat'},
          {n:'808 SLD',s:'808'},{n:'808 GLI',s:'808'},{n:'RIM',s:'snare'},{n:'OH',s:'hat'},
          {n:'PERC',s:'hat'},{n:'CHANT',s:'clap'},{n:'GUN',s:'snare'},{n:'BRR',s:'hat'},
          {n:'HORN',s:'808'},{n:'SIREN',s:'hat'},{n:'SNIPE',s:'snare'},{n:'OOH',s:'clap'}],
  '808': [{n:'808 C',s:'808'},{n:'808 D',s:'808'},{n:'808 E',s:'808'},{n:'808 F',s:'808'},
          {n:'808 G',s:'808'},{n:'808 A',s:'808'},{n:'808 B',s:'808'},{n:'808 C+',s:'808'},
          {n:'SLIDE+',s:'808'},{n:'SLIDE-',s:'808'},{n:'GLIDE',s:'808'},{n:'PUNCH',s:'808'},
          {n:'DIST',s:'808'},{n:'CLEAN',s:'808'},{n:'WAVE',s:'808'},{n:'SUB',s:'808'}],
  rnb:   [{n:'KICK S',s:'kick'},{n:'SNARE S',s:'snare'},{n:'SNAP',s:'clap'},{n:'HAT',s:'hat'},
          {n:'SHAKER',s:'hat'},{n:'BASS',s:'808'},{n:'KEYS',s:'kick'},{n:'STRINGS',s:'kick'},
          {n:'RHODES',s:'kick'},{n:'AHH',s:'clap'},{n:'OOH',s:'clap'},{n:'SIGH',s:'hat'},
          {n:'PAD',s:'808'},{n:'WHISTLE',s:'hat'},{n:'HARP',s:'kick'},{n:'BELL',s:'hat'}],
  lofi:  [{n:'VNL KICK',s:'kick'},{n:'DUSTY SN',s:'snare'},{n:'SOFT CLP',s:'clap'},{n:'HAT',s:'hat'},
          {n:'RIM',s:'snare'},{n:'BASS',s:'808'},{n:'RHODES',s:'kick'},{n:'JAZZ HT',s:'hat'},
          {n:'BRUSH',s:'hat'},{n:'SHAKER',s:'hat'},{n:'HISS',s:'hat'},{n:'POP',s:'snare'},
          {n:'WARM BS',s:'808'},{n:'ECHO',s:'clap'},{n:'CHIME',s:'hat'},{n:'PIANO',s:'kick'}],
};
const PAD_COLORS = ['#c1121f','#f97316','#ffd700','#22c55e','#06b6d4','#a855f7','#ec4899','#f5f5dc',
                   '#e63946','#ff9500','#ffd700','#4ade80','#22d3ee','#c084fc','#f472b6','#e5e5c8'];

let currentKit = 'trap';
let currentBank = 'A';
let bpm = 90;
let playing = false;
let recording = false;
let playStep = 0;
let playTimer = null;
let totalSteps = 16;
const NUM_PADS = 16;
// seqData[bank][pad][step]
const seqData = {A:{}, B:{}, C:{}, D:{}};
for(const bk of ['A','B','C','D']) for(let p=0;p<NUM_PADS;p++) seqData[bk][p]=new Array(32).fill(false);

// ============== DRUM SYNTH ==============
function playDrum(kind, vel=0.9) {
  const ctx = getAC(); const t = ctx.currentTime;
  const g = ctx.createGain(); g.gain.value = vel * 0.6; g.connect(ctx.destination);
  if(kind==='kick'){
    const o=ctx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(40,t+0.18);
    g.gain.setValueAtTime(vel,t); g.gain.exponentialRampToValueAtTime(.001,t+.45);
    o.connect(g); o.start(t); o.stop(t+.5);
  } else if(kind==='snare'){
    const buf=ctx.createBuffer(1,ctx.sampleRate*.22,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.5);
    const n=ctx.createBufferSource(); n.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2500; bp.Q.value=0.8;
    n.connect(bp); bp.connect(g); n.start(t);
  } else if(kind==='clap'){
    for(let i=0;i<3;i++){
      const buf=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,3);
      const n=ctx.createBufferSource(); n.buffer=buf;
      const bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800;
      n.connect(bp); bp.connect(g); n.start(t+i*.016);
    }
  } else if(kind==='hat'){
    const buf=ctx.createBuffer(1,ctx.sampleRate*.055,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
    const n=ctx.createBufferSource(); n.buffer=buf;
    const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=8000;
    n.connect(hp); hp.connect(g); n.start(t);
  } else if(kind==='808'){
    const o=ctx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(60,t); o.frequency.exponentialRampToValueAtTime(32,t+.9);
    g.gain.setValueAtTime(vel,t); g.gain.exponentialRampToValueAtTime(.001,t+1.3);
    const dist=ctx.createWaveShaper(); dist.curve=makeDistCurve(80); dist.oversample='4x';
    o.connect(dist); dist.connect(g); o.start(t); o.stop(t+1.4);
  } else {
    // generic tone
    const o=ctx.createOscillator(); o.type='triangle'; o.frequency.value=220+Math.random()*440;
    g.gain.setValueAtTime(vel*.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.2);
    o.connect(g); o.start(t); o.stop(t+.25);
  }
}
function makeDistCurve(amount){
  const k=amount, samples=256, curve=new Float32Array(samples);
  for(let i=0;i<samples;i++){const x=i*2/samples-1; curve[i]=(Math.PI+k)*x/(Math.PI+k*Math.abs(x));}
  return curve;
}

// ============== PAD GRID ==============
function buildPads() {
  const grid = document.getElementById('padGrid16');
  grid.innerHTML = '';
  const kit = KIT_DEFS[currentKit];
  kit.forEach((p, i) => {
    const pad = document.createElement('div');
    pad.className = 'mpad' + (seqData[currentBank][i] && seqData[currentBank][i].some(Boolean) ? ' loaded' : '');
    pad.id = 'mpad-' + i;
    pad.innerHTML = `
      <div class="color-dot" style="background:${PAD_COLORS[i]};"></div>
      <div class="pn">${String(i+1).padStart(2,'0')}</div>
      <div class="pl">${p.n}</div>
      <div class="pbar" style="width:0%"></div>`;
    pad.addEventListener('touchstart', e => {
      e.preventDefault();
      hitPad(i, 0.9);
      if(recording) recordNote(i);
    }, {passive:false});
    pad.addEventListener('mousedown', () => { hitPad(i, 0.8); if(recording) recordNote(i); });
    grid.appendChild(pad);
  });
}
function hitPad(i, vel=0.9) {
  const kit = KIT_DEFS[currentKit];
  playDrum(kit[i].s, vel);
  const pad = document.getElementById('mpad-'+i);
  if(pad) {
    pad.classList.add('hit');
    pad.style.background = `linear-gradient(135deg, ${PAD_COLORS[i]}, #0a0a0a)`;
    const bar = pad.querySelector('.pbar');
    if(bar){ bar.style.width='100%'; setTimeout(()=>bar.style.width='0%',200); }
    setTimeout(()=>{ pad.classList.remove('hit'); pad.style.background=''; },160);
  }
  if(navigator.vibrate) navigator.vibrate(12);
}

// ============== STEP SEQUENCER ==============
function buildSeq() {
  const table = document.getElementById('seqTable');
  table.innerHTML = '';
  // Beat numbers
  const hdr = document.createElement('tr');
  hdr.innerHTML = '<td class="seq-label-cell"></td>';
  for(let s=0;s<totalSteps;s++) {
    const td=document.createElement('td');
    td.className='beat-num'; td.textContent=s%4===0?String(Math.floor(s/4)+1):'.';
    hdr.appendChild(td);
  }
  table.appendChild(hdr);

  const kit = KIT_DEFS[currentKit];
  kit.forEach((p,pi) => {
    const row = document.createElement('tr');
    const lbl = document.createElement('td');
    lbl.className='seq-label-cell';
    lbl.style.color = PAD_COLORS[pi];
    lbl.textContent = p.n;
    row.appendChild(lbl);
    for(let s=0;s<totalSteps;s++){
      const td=document.createElement('td');
      const btn=document.createElement('div');
      btn.className='seq-step'+(seqData[currentBank][pi][s]?' on':'')+(playStep===s?' cur':'');
      btn.id=`ss-${pi}-${s}`;
      btn.addEventListener('click',()=>{
        seqData[currentBank][pi][s]=!seqData[currentBank][pi][s];
        btn.classList.toggle('on',seqData[currentBank][pi][s]);
        if(seqData[currentBank][pi][s]) playDrum(KIT_DEFS[currentKit][pi].s,0.7);
        if(navigator.vibrate) navigator.vibrate(8);
      });
      td.appendChild(btn); row.appendChild(td);
    }
    table.appendChild(row);
  });
}

// ============== PLAYBACK ==============
function togglePlay() {
  playing=!playing;
  document.getElementById('playBtn').textContent = playing?'⏸':'▶';
  document.getElementById('stateChip').textContent = playing?'▶ PLAY':'⏹ STOP';
  if(playing){ playStep=0; tick(); }
  else { clearTimeout(playTimer); highlightStep(-1); }
}
function tick() {
  if(!playing) return;
  highlightStep(playStep);
  const kit=KIT_DEFS[currentKit];
  for(let p=0;p<NUM_PADS;p++){
    if(seqData[currentBank][p][playStep]){
      playDrum(kit[p].s,0.9);
      const pad=document.getElementById('mpad-'+p);
      if(pad){ pad.classList.add('playing'); setTimeout(()=>pad.classList.remove('playing'),80); }
    }
  }
  document.getElementById('stepChip').textContent=(playStep+1)+'/'+totalSteps;
  playStep=(playStep+1)%totalSteps;
  const ms=(60000/bpm)/4;
  playTimer=setTimeout(tick,ms);
}
function highlightStep(s){
  document.querySelectorAll('.seq-step.cur').forEach(el=>el.classList.remove('cur'));
  if(s>=0) document.querySelectorAll(`[id$="-${s}"].seq-step`).forEach(el=>el.classList.add('cur'));
}

// ============== BPM ==============
let bpmV=90; const tapTimes=[];
function bpmShift(d){ bpmV=Math.max(40,Math.min(240,bpmV+d)); document.getElementById('bpmNum').textContent=bpmV; }
function tapTempo(){
  const now=Date.now(); tapTimes.push(now); if(tapTimes.length>6) tapTimes.shift();
  if(tapTimes.length>=2){
    const diffs=[];
    for(let i=1;i<tapTimes.length;i++) diffs.push(tapTimes[i]-tapTimes[i-1]);
    const avg=diffs.reduce((a,b)=>a+b)/diffs.length;
    bpmV=Math.round(60000/avg); document.getElementById('bpmNum').textContent=bpmV;
  }
  if(navigator.vibrate) navigator.vibrate(20);
}
function setBpm(v){ bpmV=v; document.getElementById('bpmNum').textContent=v; }

// ============== RECORD ==============
function toggleRec(){
  recording=!recording;
  document.getElementById('recBtn').style.background=recording?'linear-gradient(135deg,#c1121f,#780000)':'';
  if(navigator.vibrate) navigator.vibrate(recording?[10,30,10]:15);
}
function recordNote(padIdx){
  if(!playing) return;
  seqData[currentBank][padIdx][playStep]=true;
  const btn=document.getElementById(`ss-${padIdx}-${playStep}`);
  if(btn) btn.classList.add('on');
}

// ============== KIT / BANK ==============
function loadKit(k){ currentKit=k; buildPads(); if(currentView==='seq') buildSeq(); }
function setBank(b){
  currentBank=b;
  document.querySelectorAll('[id^="bank"]').forEach(btn=>btn.classList.remove('gold'));
  document.getElementById('bank'+b).classList.add('gold');
  buildPads(); if(currentView==='seq') buildSeq();
  if(navigator.vibrate) navigator.vibrate(10);
}

// ============== SEQ HELPERS ==============
function setSteps(n){ totalSteps=n; buildSeq(); }
function clearPattern(){
  for(let p=0;p<NUM_PADS;p++) seqData[currentBank][p].fill(false);
  buildSeq();
}
function randomPattern(){
  for(let p=0;p<NUM_PADS;p++){
    seqData[currentBank][p].fill(false);
    if(p===0){ // kick
      [0,4,8,12].forEach(s=>{ if(Math.random()>.3) seqData[currentBank][p][s]=true; });
    } else if(p===1||p===2){ // snare/clap
      [4,12].forEach(s=>{ if(Math.random()>.4) seqData[currentBank][p][s]=true; });
      if(Math.random()>.6) seqData[currentBank][p][10]=true;
    } else if(p===3){ // hat
      for(let s=0;s<totalSteps;s+=2) seqData[currentBank][p][s]=Math.random()>.35;
    } else {
      for(let s=0;s<totalSteps;s++) seqData[currentBank][p][s]=Math.random()>.8;
    }
  }
  buildSeq();
}
let copiedPattern = null;
function copyPattern(){ copiedPattern=JSON.parse(JSON.stringify(seqData[currentBank])); }
function pastePattern(){
  if(!copiedPattern) return;
  seqData[currentBank]=JSON.parse(JSON.stringify(copiedPattern));
  buildSeq();
}

// ============== PIANO ROLL ==============
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ROLL_ROWS=24; const ROLL_COLS=totalSteps;
const rollData=Array.from({length:ROLL_ROWS},()=>new Array(ROLL_COLS).fill(false));
function buildRoll(){
  const pr=document.getElementById('pianoRoll');
  pr.innerHTML='';
  for(let r=0;r<ROLL_ROWS;r++){
    const midi=84-r;
    const note=NOTES[midi%12];
    const isBlack=note.includes('#');
    const row=document.createElement('div'); row.className='pr-row';
    const key=document.createElement('div'); key.className='pr-key '+(isBlack?'black':'white');
    key.textContent=(midi%12===0)?note+(Math.floor(midi/12)-1):note;
    row.appendChild(key);
    for(let c=0;c<ROLL_COLS;c++){
      const cell=document.createElement('div');
      cell.className='pr-cell'+(c%4===3?' beat':'')+(rollData[r][c]?' on':'');
      cell.addEventListener('click',()=>{
        rollData[r][c]=!rollData[r][c]; cell.classList.toggle('on',rollData[r][c]);
        if(rollData[r][c]){
          const freq=440*Math.pow(2,(midi-69)/12);
          const ctx=getAC(); const o=ctx.createOscillator(); const g=ctx.createGain();
          o.type='triangle'; o.frequency.value=freq;
          g.gain.setValueAtTime(.25,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
          o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+.45);
        }
      });
      row.appendChild(cell);
    }
    pr.appendChild(row);
  }
}
function quantizeRoll(){ /* snap notes to nearest beat */ buildRoll(); }
function clearRoll(){ for(let r=0;r<ROLL_ROWS;r++) rollData[r].fill(false); buildRoll(); }
function shiftRollOctave(d){ /* shift all on notes up/down 12 rows */ buildRoll(); }

// ============== PATTERN CHAIN ==============
const chain=[];
function buildChainUI(){
  const box=document.getElementById('patternChain');
  box.innerHTML='';
  chain.forEach((pat,i)=>{
    const sl=document.createElement('div');
    sl.className='pat-slot has'; sl.innerHTML=`<div class="ps-num">${i+1}</div><div class="ps-label">${pat}</div>`;
    sl.addEventListener('click',()=>{ currentBank=pat; buildPads(); if(navigator.vibrate) navigator.vibrate(10); });
    box.appendChild(sl);
  });
}
function addPatternSlot(){ chain.push(currentBank); buildChainUI(); }
function clearChain(){ chain.length=0; buildChainUI(); }
let chainPlaying=false;
function toggleChainPlay(){
  chainPlaying=!chainPlaying;
  document.getElementById('chainPlayBtn').textContent=chainPlaying?'⏹ STOP':'▶ PLAY CHAIN';
}

// ============== SAVE / EXPORT ==============
function saveProject(){
  const data=JSON.stringify({seqData,bpmV,currentKit,chain});
  localStorage.setItem('goat.mpc.project',data);
  alert('💾 Project saved to local storage!');
}
function loadProject(){
  const data=localStorage.getItem('goat.mpc.project');
  if(!data){ alert('No saved project found.'); return; }
  const p=JSON.parse(data);
  Object.assign(seqData,p.seqData);
  bpmV=p.bpmV||bpmV; document.getElementById('bpmNum').textContent=bpmV;
  currentKit=p.currentKit||currentKit;
  chain.length=0; (p.chain||[]).forEach(c=>chain.push(c));
  buildPads(); buildSeq(); buildChainUI();
  alert('📂 Project loaded!');
}
function exportMidi(){
  // Basic MIDI file generation
  alert('🎵 MIDI export coming in next build!\n\nFor now: use the Step Sequencer pattern to recreate in your DAW.\n\nBPM: '+bpmV+'\nKit: '+currentKit);
}

// ============== VIEW SWITCHING ==============
let currentView='pads';
const VIEWS={pads:'viewPads',seq:'viewSeq',roll:'viewRoll',chain:'viewChain'};
function switchView(v){
  currentView=v;
  Object.values(VIEWS).forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(VIEWS[v]).style.display='block';
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  if(v==='seq') buildSeq();
  if(v==='roll') buildRoll();
  if(v==='chain') buildChainUI();
  if(navigator.vibrate) navigator.vibrate(10);
}

// ============== INIT ==============
buildPads();
</script>
