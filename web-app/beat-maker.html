<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GOAT Beat Maker — FL Studio Style</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111928;--bg4:#1a2336;
  --border:rgba(212,160,60,0.18);--gold:#d4a03c;--gold2:#f0c040;
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --cyan:#00d4ff;--orange:#f39c12;--pink:#e91e8c;
  --text:#f0ece4;--sub:#7a7060;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:var(--gold)}
.tb-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.tb-btn:hover,.tb-btn.act{background:var(--bg4);color:var(--text);border-color:var(--gold)}
.spacer{flex:1}
/* TRANSPORT */
#transport{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0}
.t-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}
.t-btn:hover{background:var(--bg4);border-color:var(--gold)}
.t-btn.act{background:rgba(46,204,113,0.2);border-color:var(--green);color:var(--green)}
.t-btn.rec.act{background:rgba(231,76,60,0.2);border-color:var(--red);color:var(--red)}
.bpm-box{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px}
.bpm-val{font-size:20px;font-weight:700;color:var(--gold);cursor:ew-resize;user-select:none;min-width:56px;text-align:center}
.pat-display{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--cyan);min-width:90px;text-align:center}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
/* LEFT - PATTERN/KIT */
#left{width:190px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.panel-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;padding:8px 10px 4px}
/* TABS */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab{padding:8px 18px;font-size:11px;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.act{color:var(--gold);border-bottom-color:var(--gold)}
/* SEQ TAB */
#seq-tab{flex:1;overflow-y:auto;overflow-x:auto}
.seq-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04);height:44px}
.seq-row:hover{background:rgba(255,255,255,0.02)}
.seq-left{width:190px;display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;border-right:1px solid var(--border)}
.seq-icon{font-size:16px;width:20px;text-align:center}
.seq-name{font-size:11px;font-weight:600;color:var(--text);flex:1}
.seq-btns{display:flex;gap:2px}
.seq-s,.seq-m{width:18px;height:18px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .2s}
.seq-s:hover,.seq-s.on{border-color:var(--green);color:var(--green)}
.seq-m:hover,.seq-m.on{border-color:var(--orange);color:var(--orange)}
.seq-vol{width:32px;height:3px;background:var(--bg4);border-radius:2px;margin-left:4px;cursor:pointer}
.seq-vol-fill{height:100%;border-radius:2px}
.steps-wrap{display:flex;flex:1;padding:0 6px;gap:2px;align-items:center;overflow-x:auto}
.step-group{display:flex;gap:2px}
.step{width:18px;height:28px;border-radius:3px;background:var(--bg4);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:background .1s,border-color .1s;flex-shrink:0}
.step.on{background:var(--clr,#d4a03c);border-color:var(--clr,#d4a03c);box-shadow:0 0 6px var(--clr,#d4a03c)}
.step.accent{outline:2px solid #fff}
.step.cur{border-top:2px solid var(--red)!important}
/* PIANO ROLL */
#roll-tab{flex:1;overflow:hidden;display:flex;flex-direction:column}
#roll-toolbar{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 10px;flex-shrink:0}
#roll-wrap{flex:1;display:flex;overflow:hidden}
#keys-canvas{display:block;flex-shrink:0}
#roll-canvas{display:block;flex:1;cursor:crosshair}
/* SONG MODE */
#song-tab{flex:1;overflow-y:auto}
.song-row{display:flex;height:36px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center}
.song-row-lbl{width:120px;font-size:10px;color:var(--sub);padding:0 8px;flex-shrink:0;border-right:1px solid var(--border)}
.song-blocks{flex:1;display:flex;padding:0 4px;gap:2px;align-items:center}
.song-block{height:28px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .2s;flex-shrink:0;border:1px solid transparent}
.song-block:hover{border-color:#fff}
/* MIX */
#mix-tab{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;padding:10px;gap:6px}
.mix-ch{width:60px;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;flex-shrink:0}
.mix-name{font-size:9px;text-align:center;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.mix-meter{width:10px;height:60px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.mix-fill{width:100%;background:linear-gradient(to top,var(--green),var(--gold),var(--red));position:absolute;bottom:0;border-radius:3px}
.mix-fader{width:46px;height:6px;background:var(--bg4);border-radius:3px;position:relative;cursor:pointer;margin-top:2px}
.mix-fader-fill{height:100%;border-radius:3px;background:var(--blue)}
.mix-pan{width:36px;display:block}
/* RIGHT PANEL */
#right{width:180px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.pat-card{padding:6px 8px;margin:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;font-size:10px}
.pat-card:hover,.pat-card.sel{border-color:var(--gold);color:var(--gold)}
.kit-card{padding:6px 8px;margin:4px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s;font-size:10px}
.kit-card:hover,.kit-card.sel{border-color:var(--cyan);color:var(--cyan)}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <span class="logo">🐐 BEAT MAKER</span>
    <div class="spacer"></div>
    <a href="studio.html"><button class="tb-btn">Studio</button></a>
    <a href="goat-mpc.html"><button class="tb-btn">MPC</button></a>
    <a href="ssl-mixer.html"><button class="tb-btn">Mixer</button></a>
    <a href="powerhouse.html"><button class="tb-btn">⬅ Home</button></a>
  </div>

  <!-- TRANSPORT -->
  <div id="transport">
    <button class="t-btn" id="btnPlay" onclick="togglePlay()">▶</button>
    <button class="t-btn rec" id="btnRec" onclick="toggleRec()">⏺</button>
    <button class="t-btn" onclick="stopSeq()">⏹</button>
    <button class="t-btn" id="btnLoop" onclick="toggleLoop()">🔁</button>
    <div class="bpm-box">
      <span style="font-size:10px;color:var(--sub)">BPM</span>
      <span class="bpm-val" id="bpmVal">140</span>
      <div style="display:flex;flex-direction:column;gap:1px">
        <button onclick="chBpm(1)" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:10px;line-height:1">▲</button>
        <button onclick="chBpm(-1)" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:10px;line-height:1">▼</button>
      </div>
    </div>
    <div class="spacer"></div>
    <span style="font-size:10px;color:var(--sub)">STEPS:</span>
    <select id="stepsSelect" onchange="changeSteps()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 6px;font-family:inherit;font-size:11px">
      <option value="16">16</option><option value="32">32</option><option value="64" selected>64</option>
    </select>
    <span style="font-size:10px;color:var(--sub)">PAT:</span>
    <span class="pat-display" id="patDisplay">Pattern 1</span>
    <div class="spacer"></div>
    <button class="t-btn" onclick="clearPat()">🗑</button>
    <button class="t-btn" onclick="randPat()">🎲</button>
    <button class="t-btn" onclick="openExport()">📤</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- LEFT -->
    <div id="left">
      <div class="panel-title">📦 Patterns</div>
      <div id="pat-list"></div>
      <div class="panel-title" style="margin-top:8px">🥁 Drum Kits</div>
      <div id="kit-list"></div>
      <div class="panel-title" style="margin-top:8px">🤖 AI</div>
      <button class="tb-btn" style="width:calc(100%-16px);margin:4px 8px;text-align:left;display:flex;align-items:center;gap:6px" onclick="aiGen()"><span>✨</span>AI Beat</button>
      <button class="tb-btn" style="width:calc(100%-16px);margin:4px 8px;text-align:left;display:flex;align-items:center;gap:6px" onclick="aiFill()"><span>🎯</span>Auto Fill</button>
      <button class="tb-btn" style="width:calc(100%-16px);margin:4px 8px;text-align:left;display:flex;align-items:center;gap:6px" onclick="humanize()"><span>🫀</span>Humanize</button>
    </div>

    <!-- CENTER -->
    <div id="center">
      <div id="tabs">
        <div class="tab act" onclick="switchTab('seq',this)">Step Sequencer</div>
        <div class="tab" onclick="switchTab('roll',this)">Piano Roll</div>
        <div class="tab" onclick="switchTab('song',this)">Song Mode</div>
        <div class="tab" onclick="switchTab('mix',this)">Mix</div>
      </div>
      <!-- SEQ -->
      <div id="seq-tab"></div>
      <!-- ROLL -->
      <div id="roll-tab" style="display:none">
        <div id="roll-toolbar">
          <span style="font-size:10px;color:var(--sub)">Inst:</span>
          <select id="rollInst" onchange="drawRoll()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px;font-family:inherit;font-size:10px"></select>
          <button class="tb-btn" onclick="rollTool='draw'">✏ Draw</button>
          <button class="tb-btn" onclick="rollTool='erase'">🗑 Erase</button>
          <button class="tb-btn" onclick="rollNotes[rollInstIdx]=[];drawRoll()">Clear</button>
          <span class="spacer"></span>
          <span style="font-size:10px;color:var(--sub)">Snap: 1/16</span>
        </div>
        <div id="roll-wrap">
          <canvas id="keys-canvas" width="48"></canvas>
          <canvas id="roll-canvas"></canvas>
        </div>
      </div>
      <!-- SONG -->
      <div id="song-tab" style="display:none"></div>
      <!-- MIX -->
      <div id="mix-tab" style="display:none"></div>
    </div>

    <!-- RIGHT -->
    <div id="right">
      <div class="panel-title">🎚 Velocity</div>
      <canvas id="vel-canvas" style="width:100%;height:80px;display:block"></canvas>
      <div class="panel-title" style="margin-top:8px">⚙ Step Edit</div>
      <div style="padding:6px 10px;font-size:10px;color:var(--sub)">
        <div style="margin-bottom:6px">Velocity: <input type="range" min="0" max="127" value="100" style="width:100px;accent-color:var(--gold)"> <span id="velVal">100</span></div>
        <div style="margin-bottom:6px">Probability: <input type="range" min="0" max="100" value="100" style="width:80px;accent-color:var(--purple)"> <span>100%</span></div>
        <div>Offset: <input type="range" min="-50" max="50" value="0" style="width:90px;accent-color:var(--cyan)"> <span>0</span></div>
      </div>
      <div class="panel-title" style="margin-top:8px">🎛 Channel FX</div>
      <div style="padding:6px 10px;display:grid;gap:6px">
        <div style="font-size:10px;color:var(--sub);display:flex;justify-content:space-between">
          <span>Volume</span><span style="color:var(--text)">100%</span>
        </div>
        <input type="range" min="0" max="150" value="100" style="width:100%;accent-color:var(--green)">
        <div style="font-size:10px;color:var(--sub);display:flex;justify-content:space-between">
          <span>Pan</span><span style="color:var(--text)">C</span>
        </div>
        <input type="range" min="-100" max="100" value="0" style="width:100%;accent-color:var(--blue)">
        <div style="font-size:10px;color:var(--sub);display:flex;justify-content:space-between">
          <span>Pitch</span><span style="color:var(--text)">0 st</span>
        </div>
        <input type="range" min="-24" max="24" value="0" style="width:100%;accent-color:var(--purple)">
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let bpm=140, playing=false, recording=false, looping=true;
let currentStep=0, stepCount=64, seqInterval=null;
let currentPat=0, currentKit=0, rollTool='draw', rollInstIdx=0;

const KITS = [
  {name:'Trap Kit',    icon:'🔥', color:'#e74c3c'},
  {name:'Boom Bap',   icon:'🎵', color:'#3498db'},
  {name:'Lo-Fi',      icon:'🎶', color:'#9b59b6'},
  {name:'808 Heavy',  icon:'💥', color:'#f39c12'},
  {name:'House Kit',  icon:'🏠', color:'#1abc9c'},
  {name:'R&B Kit',    icon:'🎤', color:'#e91e8c'},
  {name:'Jazz Kit',   icon:'🎷', color:'#d4a03c'},
  {name:'Custom',     icon:'⚙',  color:'#7f8c8d'},
];

const INSTS = [
  {n:'Kick',      icon:'🥁', color:'#e74c3c'},
  {n:'Snare',     icon:'🎯', color:'#e67e22'},
  {n:'Hi-Hat C',  icon:'🔔', color:'#f1c40f'},
  {n:'Hi-Hat O',  icon:'🔕', color:'#f1c40f'},
  {n:'Clap',      icon:'👏', color:'#2ecc71'},
  {n:'808 Bass',  icon:'🔊', color:'#3498db'},
  {n:'Perc',      icon:'🪘', color:'#9b59b6'},
  {n:'FX',        icon:'✨', color:'#e91e8c'},
];

// patterns[pat][inst][step]
const patterns = Array.from({length:8},()=>Array.from({length:8},()=>Array(64).fill(0)));
const rollNotes = Array.from({length:8},()=>[]);

// seed default pattern
function seedPattern(){
  const p=patterns[0];
  // kick on 0,4,8,12... every 4 steps (quarter notes at 64 steps)
  for(let s=0;s<64;s+=16)p[0][s]=1;
  for(let s=8;s<64;s+=16)p[0][s]=1;
  // snare on 16,48
  p[1][16]=1;p[1][48]=1;
  // hh every 8 steps
  for(let s=0;s<64;s+=8)p[2][s]=1;
  // open hh
  p[3][12]=1;p[3][28]=1;p[3][44]=1;p[3][60]=1;
  // clap with snare
  p[4][16]=1;p[4][48]=1;
  // 808 bass
  p[5][0]=1;p[5][10]=1;p[5][32]=1;p[5][42]=1;
}

// ── AUDIO ──
let actx=null;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}

function playDrum(type,vel=0.8){
  const ac=getACtx();
  const g=ac.createGain();g.gain.setValueAtTime(vel,ac.currentTime);g.connect(ac.destination);
  switch(type){
    case 0:{ // kick
      const o=ac.createOscillator();o.connect(g);
      o.frequency.setValueAtTime(160,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(30,ac.currentTime+0.35);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);
      o.start();o.stop(ac.currentTime+0.4);break;
    }
    case 1:{ // snare
      const buf=ac.createBuffer(1,ac.sampleRate*0.18,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=2200;f.Q.value=0.8;
      src.connect(f);f.connect(g);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.18);
      src.start();src.stop(ac.currentTime+0.18);break;
    }
    case 2:{ // hh closed
      const buf=ac.createBuffer(1,ac.sampleRate*0.06,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=8000;
      src.connect(f);f.connect(g);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.06);
      src.start();src.stop(ac.currentTime+0.06);break;
    }
    case 3:{ // hh open
      const buf=ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=6000;
      src.connect(f);f.connect(g);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
      src.start();src.stop(ac.currentTime+0.3);break;
    }
    case 4:{ // clap
      const buf=ac.createBuffer(1,ac.sampleRate*0.12,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/2000);
      const src=ac.createBufferSource();src.buffer=buf;src.connect(g);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);
      src.start();src.stop(ac.currentTime+0.12);break;
    }
    case 5:{ // 808 bass
      const o=ac.createOscillator();o.type='sine';
      const dist=ac.createWaveShaper();
      const c=new Float32Array(256);for(let i=0;i<256;i++)c[i]=Math.tanh((i/128-1)*3);
      dist.curve=c;
      o.connect(dist);dist.connect(g);
      o.frequency.setValueAtTime(80,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(40,ac.currentTime+0.6);
      g.gain.setValueAtTime(vel,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.7);
      o.start();o.stop(ac.currentTime+0.7);break;
    }
    case 6:{ // perc
      const o=ac.createOscillator();o.type='triangle';o.connect(g);
      o.frequency.setValueAtTime(400+Math.random()*200,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);
      o.start();o.stop(ac.currentTime+0.1);break;
    }
    case 7:{ // fx
      const o=ac.createOscillator();o.type='sawtooth';o.connect(g);
      o.frequency.setValueAtTime(600,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200+Math.random()*400,ac.currentTime+0.1);
      g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
      o.start();o.stop(ac.currentTime+0.15);break;
    }
  }
}

// ── SEQ ──
function scheduleStep(){
  const pat=patterns[currentPat];
  INSTS.forEach((inst,row)=>{
    if(pat[row][currentStep]){
      playDrum(row,0.7+pat[row][currentStep]*0.3);
    }
  });
  currentStep=(currentStep+1)%stepCount;
  buildSeq();
  drawVelCanvas();
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('btnPlay');
  btn.classList.toggle('act',playing);btn.textContent=playing?'⏸':'▶';
  if(playing){getACtx();seqInterval=setInterval(scheduleStep,(60/bpm/4)*1000);}
  else{clearInterval(seqInterval);}
}
function toggleRec(){recording=!recording;document.getElementById('btnRec').classList.toggle('act',recording);}
function toggleLoop(){looping=!looping;document.getElementById('btnLoop').classList.toggle('act',looping);}
function stopSeq(){playing=false;clearInterval(seqInterval);currentStep=0;
  document.getElementById('btnPlay').classList.remove('act');document.getElementById('btnPlay').textContent='▶';buildSeq();}
function chBpm(d){
  bpm=Math.max(40,Math.min(280,bpm+d));
  document.getElementById('bpmVal').textContent=bpm;
  if(playing){clearInterval(seqInterval);seqInterval=setInterval(scheduleStep,(60/bpm/4)*1000);}
}
function changeSteps(){stepCount=parseInt(document.getElementById('stepsSelect').value);buildSeq();}

// ── BUILD SEQ ──
function buildSeq(){
  const el=document.getElementById('seq-tab');
  if(el.style.display==='none')return;
  const stepsToShow=stepCount;
  const groupSize=16;
  el.innerHTML='';
  INSTS.forEach((inst,row)=>{
    const div=document.createElement('div');
    div.className='seq-row';
    // left
    const left=document.createElement('div');left.className='seq-left';
    left.innerHTML=`
      <span class="seq-icon">${inst.icon}</span>
      <span class="seq-name">${inst.n}</span>
      <div class="seq-btns">
        <button class="seq-s ${inst.solo?'on':''}" onclick="toggleSolo(${row})">S</button>
        <button class="seq-m ${inst.muted?'on':''}" onclick="toggleMute(${row})">M</button>
      </div>
      <canvas class="miniknob" data-row="${row}" width="24" height="24" style="cursor:pointer"></canvas>
    `;
    div.appendChild(left);
    // steps
    const stepsWrap=document.createElement('div');stepsWrap.className='steps-wrap';
    for(let g=0;g<Math.ceil(stepsToShow/groupSize);g++){
      const grp=document.createElement('div');grp.className='step-group';
      for(let s=g*groupSize;s<Math.min((g+1)*groupSize,stepsToShow);s++){
        const btn=document.createElement('div');
        btn.className='step'+(patterns[currentPat][row][s]?' on':'')+(s===currentStep&&playing?' cur':'');
        btn.style.setProperty('--clr',inst.color);
        btn.addEventListener('click',()=>{
          patterns[currentPat][row][s]=patterns[currentPat][row][s]?0:1;
          buildSeq();
        });
        btn.addEventListener('contextmenu',e=>{e.preventDefault();patterns[currentPat][row][s]=2;buildSeq();});
        grp.appendChild(btn);
      }
      stepsWrap.appendChild(grp);
    }
    div.appendChild(stepsWrap);
    el.appendChild(div);
  });
  // draw mini knobs
  el.querySelectorAll('.miniknob').forEach(cv=>{drawMiniKnob(cv,0.75,INSTS[cv.dataset.row].color);});
}

let instSolo=[...Array(8)].map(()=>false);
let instMuted=[...Array(8)].map(()=>false);
function toggleSolo(r){instSolo[r]=!instSolo[r];}
function toggleMute(r){instMuted[r]=!instMuted[r];}

function drawMiniKnob(cv,val,color){
  const ctx=cv.getContext('2d');const r=10;const cx=12,cy=12;
  ctx.clearRect(0,0,24,24);
  ctx.beginPath();ctx.arc(cx,cy,r,-2.4,0.7);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=3;ctx.stroke();
  const angle=-2.4+val*3.1;
  ctx.beginPath();ctx.arc(cx,cy,r,-2.4,angle);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  const dx=cx+r*0.6*Math.cos(angle),dy=cy+r*0.6*Math.sin(angle);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(dx,dy);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
}

// ── PIANO ROLL ──
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_H=14, BEAT_W=50, TOTAL_BEATS=32;
let rollDragging=false,rollDragNote=null;

function buildRollInstruments(){
  const sel=document.getElementById('rollInst');
  sel.innerHTML=INSTS.map((i,idx)=>`<option value="${idx}">${i.icon} ${i.n}</option>`).join('');
}

function drawPianoKeys(){
  const cv=document.getElementById('keys-canvas');
  const totalNotes=88;
  cv.height=totalNotes*NOTE_H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#111928';ctx.fillRect(0,0,48,cv.height);
  for(let n=0;n<totalNotes;n++){
    const noteIdx=(totalNotes-1-n)%12;
    const isBlack=[1,3,6,8,10].includes(noteIdx);
    const y=n*NOTE_H;
    ctx.fillStyle=isBlack?'#1a1a2e':'#f0ece4';
    ctx.fillRect(0,y+1,48,NOTE_H-1);
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.strokeRect(0,y,48,NOTE_H);
    if(noteIdx===0){
      const octave=Math.floor((totalNotes-1-n)/12);
      ctx.fillStyle='#7a7060';ctx.font='8px monospace';
      ctx.fillText('C'+octave,isBlack?2:2,y+NOTE_H-3);
    }
  }
}

function drawRoll(){
  rollInstIdx=parseInt(document.getElementById('rollInst').value)||0;
  const cv=document.getElementById('roll-canvas');
  const totalNotes=88;
  const w=BEAT_W*TOTAL_BEATS, h=totalNotes*NOTE_H;
  cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  // bg
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  // note rows
  for(let n=0;n<totalNotes;n++){
    const noteIdx=(totalNotes-1-n)%12;
    const isBlack=[1,3,6,8,10].includes(noteIdx);
    const y=n*NOTE_H;
    ctx.fillStyle=isBlack?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.02)';
    ctx.fillRect(0,y,w,NOTE_H);
  }
  // beat lines
  for(let b=0;b<=TOTAL_BEATS;b++){
    const x=b*BEAT_W;
    ctx.strokeStyle=b%4===0?'rgba(212,160,60,0.25)':'rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
    if(b%4===0&&b<TOTAL_BEATS){
      ctx.fillStyle='rgba(212,160,60,0.5)';ctx.font='9px monospace';
      ctx.fillText(b/4+1,x+3,h-4);
    }
  }
  // notes
  const notes=rollNotes[rollInstIdx]||[];
  const color=INSTS[rollInstIdx].color;
  notes.forEach(note=>{
    const y=note.pitch*NOTE_H;
    const x=note.beat*BEAT_W;
    const nw=note.len*BEAT_W-2;
    ctx.fillStyle=hexA(color,0.8);
    roundR(ctx,x+1,y+2,nw,NOTE_H-4,2);ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=1;roundR(ctx,x+1,y+2,nw,NOTE_H-4,2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 8px monospace';
    ctx.fillText(NOTE_NAMES[(totalNotes-1-note.pitch)%12],x+4,y+NOTE_H-4);
  });
  // update piano keys height
  document.getElementById('keys-canvas').style.height=h+'px';
  drawPianoKeys();
}
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function roundR(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── SONG MODE ──
function buildSong(){
  const el=document.getElementById('song-tab');
  el.innerHTML='';
  const headerRow=document.createElement('div');
  headerRow.style.cssText='display:flex;height:24px;border-bottom:1px solid var(--border);background:var(--bg2)';
  headerRow.innerHTML='<div style="width:120px;flex-shrink:0;border-right:1px solid var(--border)"></div>'+
    Array.from({length:32},(_,i)=>`<div style="width:50px;flex-shrink:0;font-size:9px;color:var(--sub);display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,0.04)">${i+1}</div>`).join('');
  el.appendChild(headerRow);
  INSTS.forEach((inst,row)=>{
    const div=document.createElement('div');div.className='song-row';
    div.innerHTML=`<div class="song-row-lbl">${inst.icon} ${inst.n}</div><div class="song-blocks" id="sb${row}"></div>`;
    el.appendChild(div);
  });
  // place some demo blocks
  INSTS.forEach((inst,row)=>{
    const wrap=document.getElementById('sb'+row);
    for(let b=0;b<32;b++){
      const on=Math.random()>0.55;
      const blk=document.createElement('div');
      blk.className='song-block';
      blk.style.cssText=`width:46px;background:${on?hexA(inst.color,0.55):'rgba(255,255,255,0.03)'};border-color:${on?inst.color:'transparent'}`;
      blk.textContent=on?'P1':'';
      blk.onclick=()=>{
        const isOn=blk.textContent==='P1';
        blk.style.background=isOn?'rgba(255,255,255,0.03)':hexA(inst.color,0.55);
        blk.style.borderColor=isOn?'transparent':inst.color;
        blk.textContent=isOn?'':'P1';
      };
      wrap.appendChild(blk);
    }
  });
}

// ── MIX VIEW ──
function buildMix(){
  const el=document.getElementById('mix-tab');
  el.innerHTML='';
  INSTS.forEach((inst,i)=>{
    const ch=document.createElement('div');ch.className='mix-ch';
    ch.innerHTML=`
      <div class="mix-meter"><div class="mix-fill" id="mmix${i}" style="height:60%"></div></div>
      <canvas class="mix-pan" id="mpan${i}" width="36" height="24"></canvas>
      <div class="mix-fader"><div class="mix-fader-fill" style="width:80%"></div></div>
      <div class="mix-name" style="color:${inst.color}">${inst.icon} ${inst.n}</div>
    `;
    el.appendChild(ch);
  });
  // master channel
  const mst=document.createElement('div');
  mst.className='mix-ch';mst.style.background='rgba(212,160,60,0.05)';
  mst.innerHTML=`<div class="mix-meter"><div class="mix-fill" id="mmixM" style="height:65%"></div></div>
    <div class="mix-fader"><div class="mix-fader-fill" style="width:100%"></div></div>
    <div class="mix-name" style="color:var(--gold)">MASTER</div>`;
  el.appendChild(mst);
  // draw pan knobs
  INSTS.forEach((_,i)=>{
    const cv=document.getElementById('mpan'+i);
    if(!cv)return;
    drawMiniKnob(cv,0.5,INSTS[i].color);
  });
}

// ── VEL CANVAS ──
function drawVelCanvas(){
  const cv=document.getElementById('vel-canvas');
  cv.width=cv.offsetWidth||180;cv.height=80;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,cv.width,80);
  const pat=patterns[currentPat][rollInstIdx]||patterns[currentPat][0];
  const stepsToShow=Math.min(stepCount,32);
  const sw=cv.width/stepsToShow;
  for(let s=0;s<stepsToShow;s++){
    if(pat[s]){
      const h=pat[s]===2?70:50+Math.random()*20;
      const color=pat[s]===2?'#f0c040':INSTS[rollInstIdx]?.color||'#d4a03c';
      ctx.fillStyle=hexA(color,0.8);
      ctx.fillRect(s*sw+1,80-h,sw-2,h);
    }
  }
}

// ── PATTERN / KIT LISTS ──
function buildPatList(){
  const el=document.getElementById('pat-list');
  el.innerHTML=Array.from({length:8},(_,i)=>`
    <div class="pat-card ${i===currentPat?'sel':''}" onclick="selPat(${i})">
      Pattern ${i+1}
    </div>
  `).join('');
}
function selPat(i){currentPat=i;buildPatList();buildSeq();document.getElementById('patDisplay').textContent='Pattern '+(i+1);}

function buildKitList(){
  const el=document.getElementById('kit-list');
  el.innerHTML=KITS.map((k,i)=>`
    <div class="kit-card ${i===currentKit?'sel':''}" onclick="selKit(${i})">
      ${k.icon} ${k.name}
    </div>
  `).join('');
}
function selKit(i){currentKit=i;buildKitList();}

// ── UTILS ──
function clearPat(){patterns[currentPat]=Array.from({length:8},()=>Array(64).fill(0));buildSeq();}
function randPat(){
  const p=patterns[currentPat];
  p.forEach((row,r)=>row.forEach((_,s)=>{p[r][s]=Math.random()>0.8?1:0;}));
  // always put kick on 0
  p[0][0]=1;
  buildSeq();
}
function humanize(){
  const p=patterns[currentPat];
  const newP=p.map(row=>{
    const nr=[...row];
    // randomly nudge 10% of steps
    for(let s=0;s<stepCount;s++){if(nr[s]&&Math.random()<0.1){nr[s]=0;const ns=(s+1)%stepCount;nr[ns]=1;}}
    return nr;
  });
  patterns[currentPat]=newP;buildSeq();
}
function aiGen(){
  clearPat();
  const p=patterns[currentPat];
  // generate a trap-ish pattern
  const kicks=[0,10,16,26,32,42,48,58];const snares=[16,48];
  kicks.forEach(s=>{if(s<stepCount)p[0][s]=1;});
  snares.forEach(s=>{if(s<stepCount)p[1][s]=1;});
  for(let s=0;s<stepCount;s+=4)p[2][s]=1;
  p[3][12]=1;p[3][44]=1;p[5][0]=1;p[5][24]=1;
  buildSeq();
}
function aiFill(){
  // add some extra steps
  const p=patterns[currentPat];
  for(let s=0;s<stepCount;s++){if(Math.random()>0.92)p[Math.floor(Math.random()*5)][s]=1;}
  buildSeq();
}

function openExport(){
  const choices=['WAV Stereo','WAV Stems','MIDI','Ableton Set'];
  alert('Export as:\n'+choices.join('\n')+'\n\n[Feature ready — connect to export engine]');
}

// ── TABS ──
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  ['seq','roll','song','mix'].forEach(t=>document.getElementById(t+'-tab').style.display='none');
  document.getElementById(tab+'-tab').style.display='flex';
  if(tab==='seq')buildSeq();
  if(tab==='roll'){drawPianoKeys();drawRoll();}
  if(tab==='song')buildSong();
  if(tab==='mix')buildMix();
}

// fix seq tab display
document.getElementById('seq-tab').style.display='flex';
document.getElementById('seq-tab').style.flexDirection='column';
document.getElementById('seq-tab').style.overflowY='auto';

// ── ROLL EVENTS ──
function initRollEvents(){
  const cv=document.getElementById('roll-canvas');
  cv.addEventListener('mousedown',e=>{
    rollDragging=true;
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    const beat=x/BEAT_W, pitch=Math.floor(y/NOTE_H);
    const beatFloor=Math.floor(beat/0.25)*0.25;
    if(rollTool==='draw'){
      rollDragNote={pitch,beat:beatFloor,len:0.25};
      rollNotes[rollInstIdx].push(rollDragNote);
    } else {
      rollNotes[rollInstIdx]=rollNotes[rollInstIdx].filter(n=>
        !(n.pitch===pitch && n.beat<=beat && n.beat+n.len>beat));
    }
    drawRoll();
  });
  cv.addEventListener('mousemove',e=>{
    if(!rollDragging||rollTool!=='draw'||!rollDragNote)return;
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const beat=Math.max(rollDragNote.beat+0.25, Math.floor(x/BEAT_W/0.25)*0.25);
    rollDragNote.len=beat-rollDragNote.beat;
    drawRoll();
  });
  cv.addEventListener('mouseup',()=>{rollDragging=false;rollDragNote=null;});
}

// ── METER ANIM ──
setInterval(()=>{
  INSTS.forEach((_,i)=>{
    const el=document.getElementById('mmix'+i);
    if(el){const h=playing&&patterns[currentPat][i].some(s=>s)?(20+Math.random()*70):(2+Math.random()*4);el.style.height=h+'%';}
  });
  const m=document.getElementById('mmixM');
  if(m)m.style.height=(playing?(50+Math.random()*40):(2+Math.random()*4))+'%';
},80);

// ── INIT ──
function init(){
  seedPattern();
  buildPatList();
  buildKitList();
  buildSeq();
  buildRollInstruments();
  initRollEvents();
  drawVelCanvas();
  // bpm drag
  const bv=document.getElementById('bpmVal');
  let bd=false,bsx=0,bsv=0;
  bv.addEventListener('mousedown',e=>{bd=true;bsx=e.clientX;bsv=bpm;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!bd)return;bpm=Math.max(40,Math.min(280,bsv+Math.round((e.clientX-bsx)/2)));bv.textContent=bpm;});
  document.addEventListener('mouseup',()=>bd=false);
}

window.addEventListener('DOMContentLoaded',init);
</script>
