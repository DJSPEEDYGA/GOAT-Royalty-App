<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GOAT Vocal Studio — Pro Vocal Chain</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111928;--bg4:#1a2336;
  --border:rgba(212,160,60,0.18);--gold:#d4a03c;--gold2:#f0c040;
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --cyan:#00d4ff;--orange:#f39c12;--pink:#e91e8c;
  --text:#f0ece4;--sub:#7a7060;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:var(--gold)}
.tb-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.tb-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--gold)}
.spacer{flex:1}
/* CHAIN BAR */
#chain-bar{height:58px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:0;overflow-x:auto;flex-shrink:0}
.chain-node{display:flex;align-items:center;flex-shrink:0}
.chain-plug{width:56px;height:38px;border-radius:6px;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0}
.chain-plug:hover{transform:translateY(-2px)}
.chain-plug.sel{transform:translateY(-2px);box-shadow:0 0 12px var(--plug-color,#d4a03c)}
.chain-plug.bypassed{opacity:0.35;filter:grayscale(0.6)}
.chain-plug-name{font-size:7px;font-weight:700;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;padding:0 2px;line-height:1.2}
.chain-plug-type{font-size:6px;color:rgba(255,255,255,0.55);text-align:center}
.chain-arrow{font-size:10px;color:var(--sub);margin:0 2px;flex-shrink:0}
.chain-power{position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.5);cursor:pointer}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
/* LEFT CHAIN LIST */
#left{width:180px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.chain-item{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s}
.chain-item:hover,.chain-item.sel{background:var(--bg3)}
.chain-item.sel .ci-name{color:var(--gold)}
.ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ci-name{font-size:10px;font-weight:600;color:var(--text)}
.ci-brand{font-size:8px;color:var(--sub)}
.ci-on{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.ci-on.active{background:var(--green);border-color:var(--green);color:#000}
/* CENTER - PLUGIN VIEW */
#center{flex:1;overflow-y:auto;overflow-x:hidden;padding:0}
/* PLUGIN PANEL */
.plugin-panel{background:var(--bg2);border-bottom:1px solid var(--border)}
.pp-header{height:42px;display:flex;align-items:center;gap:8px;padding:0 12px;cursor:pointer;transition:all .2s}
.pp-header:hover{background:var(--bg3)}
.pp-power-led{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.pp-brand{font-size:9px;color:var(--sub);width:70px;flex-shrink:0}
.pp-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.pp-type-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px}
.pp-gr-bar{width:60px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pp-gr-fill{height:100%;border-radius:2px;background:var(--green);transition:width .1s}
.pp-expand{font-size:10px;color:var(--sub);transition:transform .2s}
.pp-expand.open{transform:rotate(180deg)}
.pp-body{display:none;padding:12px 14px;gap:10px;flex-direction:column;border-top:1px solid rgba(255,255,255,0.04)}
.pp-body.open{display:flex}
.knob-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.knob-label{font-size:8px;color:var(--sub);text-align:center;white-space:nowrap}
.knob-val{font-size:8px;color:var(--text);text-align:center;font-weight:600}
/* EQ CANVAS */
.eq-canvas-wrap{background:var(--bg3);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
/* GR METER FULL */
.gr-meter-full{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;width:100%;margin-top:4px}
.gr-meter-fill{height:100%;border-radius:4px;background:linear-gradient(to right,var(--green),var(--gold),var(--red));transition:width .1s}
/* HARMONY */
.harmony-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.voice-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px}
.voice-title{font-size:9px;font-weight:700;color:var(--gold);margin-bottom:6px}
/* RIGHT PANEL */
#right{width:200px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.rp-section{border-bottom:1px solid var(--border);padding:10px}
.rp-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
/* PITCH METER */
#pitch-meter-wrap{background:var(--bg3);border-radius:6px;padding:8px;border:1px solid var(--border)}
.pitch-note{font-size:28px;font-weight:900;color:var(--gold);text-align:center;font-family:sans-serif}
.pitch-cents-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:4px 0}
.pitch-cents-fill{height:100%;border-radius:3px;background:var(--green);transition:width .12s,background .12s}
.pitch-info{font-size:9px;color:var(--sub);text-align:center}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

let selectedPlugin = 0;

// ── CANVAS KNOB ──
function mkKnob(size, val, color, onChange){
  const cv=document.createElement('canvas');cv.width=size;cv.height=size;cv.style.cursor='ns-resize';cv.style.flexShrink='0';
  drawKnob(cv,val,color,size);
  let drag=false,startY=0,startV=val;
  cv.dataset.val=val;
  cv.addEventListener('mousedown',e=>{drag=true;startY=e.clientY;startV=parseFloat(cv.dataset.val);e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const nv=Math.max(0,Math.min(1,startV-(e.clientY-startY)/80));
    cv.dataset.val=nv;drawKnob(cv,nv,color,size);if(onChange)onChange(nv);
  });
  document.addEventListener('mouseup',()=>drag=false);
  return cv;
}
function drawKnob(cv,val,color,size){
  const ctx=cv.getContext('2d');const cx=size/2,cy=size/2,r=size/2-2;
  ctx.clearRect(0,0,size,size);
  const g2=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,1,cx,cy,r);
  g2.addColorStop(0,'#2a3448');g2.addColorStop(1,'#111928');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r-2,-2.4,0.7);ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=3;ctx.stroke();
  const angle=-2.4+val*3.1;
  ctx.beginPath();ctx.arc(cx,cy,r-2,-2.4,angle);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  const dx=cx+(r-5)*Math.cos(angle),dy=cy+(r-5)*Math.sin(angle);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(dx,dy);ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
}

// ── CHAIN BAR ──
function buildChainBar(){
  const el=document.getElementById('chain-bar');
  el.innerHTML='';
  plugins.forEach((p,i)=>{
    if(i>0){const arr=document.createElement('div');arr.className='chain-arrow';arr.textContent='→';el.appendChild(arr);}
    const node=document.createElement('div');
    node.className='chain-node';
    const plug=document.createElement('div');
    plug.className='chain-plug'+(i===selectedPlugin?' sel':'')+(p.power?'':' bypassed');
    plug.style.setProperty('--plug-color',p.color);
    plug.style.background=hexA(p.color,0.2);
    plug.style.borderColor=i===selectedPlugin?p.color:hexA(p.color,0.4);
    plug.innerHTML=`
      <div class="chain-plug-name">${p.name}</div>
      <div class="chain-plug-type">${p.type}</div>
      <div class="chain-power" style="background:${p.power?p.color:'var(--sub)'}"></div>
    `;
    plug.onclick=()=>{selectedPlugin=i;buildChainBar();buildChainList();scrollToPlugin(i);};
    node.appendChild(plug);
    el.appendChild(node);
  });
}

// ── CHAIN LIST ──
function buildChainList(){
  const el=document.getElementById('chain-list');
  el.innerHTML='';
  plugins.forEach((p,i)=>{
    const item=document.createElement('div');
    item.className='chain-item'+(i===selectedPlugin?' sel':'');
    item.innerHTML=`
      <div class="ci-dot" style="background:${p.color};box-shadow:${p.power?'0 0 6px '+p.color:'none'}"></div>
      <div style="flex:1;min-width:0">
        <div class="ci-name">${p.name}</div>
        <div class="ci-brand">${p.brand}</div>
      </div>
      <button class="ci-on ${p.power?'active':''}" onclick="toggleBypass(${i},event)">${p.power?'●':'○'}</button>
    `;
    item.onclick=()=>{selectedPlugin=i;buildChainBar();buildChainList();scrollToPlugin(i);};
    el.appendChild(item);
  });
}

// ── PLUGINS VIEW ──
function buildPlugins(){
  const el=document.getElementById('center');
  el.innerHTML='';
  plugins.forEach((p,i)=>{
    const panel=document.createElement('div');
    panel.className='plugin-panel';
    panel.id='pp'+i;
    const header=document.createElement('div');header.className='pp-header';
    const led=document.createElement('div');led.className='pp-power-led';
    led.style.background=p.power?p.color:'var(--sub)';led.style.color=p.power?p.color:'var(--sub)';
    const brand=document.createElement('div');brand.className='pp-brand';brand.textContent=p.brand;
    const name=document.createElement('div');name.className='pp-name';name.textContent=p.name;
    const badge=document.createElement('div');badge.className='pp-type-badge';
    badge.style.background=hexA(p.typeColor,0.2);badge.style.color=p.typeColor;badge.textContent=p.type;
    const grBar=document.createElement('div');grBar.className='pp-gr-bar';
    const grFill=document.createElement('div');grFill.className='pp-gr-fill';grFill.id='grfill'+i;
    grBar.appendChild(grFill);
    const exp=document.createElement('div');exp.className='pp-expand'+(i===selectedPlugin?' open':'');exp.textContent='▼';
    header.append(led,brand,name,badge,grBar,exp);
    header.onclick=()=>{
      selectedPlugin=i;
      body.classList.toggle('open');
      exp.classList.toggle('open',body.classList.contains('open'));
      buildChainBar();buildChainList();
    };
    const body=document.createElement('div');body.className='pp-body'+(i===selectedPlugin?' open':'');
    body.appendChild(buildPluginBody(p,i));
    panel.append(header,body);
    el.appendChild(panel);
  });
}

function buildPluginBody(p,i){
  const wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;gap:10px;width:100%';

  // Knob row
  const knobRow=document.createElement('div');knobRow.className='knob-row';
  p.params.forEach(param=>{
    const kw=document.createElement('div');kw.className='knob-wrap';
    const cv=mkKnob(32,param.v,param.c,(nv)=>{param.v=nv;});
    const lbl=document.createElement('div');lbl.className='knob-label';lbl.textContent=param.n;
    const val=document.createElement('div');val.className='knob-val';val.textContent=Math.round(param.v*100);
    cv.addEventListener('mousemove',()=>{val.textContent=Math.round(parseFloat(cv.dataset.val)*100);});
    kw.append(cv,lbl,val);knobRow.appendChild(kw);
  });
  wrap.appendChild(knobRow);

  // EQ Canvas
  if(p.hasEQ){
    const eqWrap=document.createElement('div');eqWrap.className='eq-canvas-wrap';
    const eqCv=document.createElement('canvas');eqCv.width=500;eqCv.height=80;eqCv.style.width='100%';eqCv.style.display='block';
    eqWrap.appendChild(eqCv);wrap.appendChild(eqWrap);
    setTimeout(()=>drawEQCurve(eqCv,p),50);
  }

  // GR Meter
  const grFull=document.createElement('div');grFull.className='gr-meter-full';
  const grFillEl=document.createElement('div');grFillEl.className='gr-meter-fill';grFillEl.id='grfull'+i;grFillEl.style.width='0%';
  grFull.appendChild(grFillEl);
  const grLbl=document.createElement('div');grLbl.style.cssText='display:flex;justify-content:space-between;font-size:8px;color:var(--sub);margin-top:2px';
  grLbl.innerHTML='<span>GR Reduction</span><span id="grval'+i+'">0.0 dB</span>';
  wrap.append(grFull,grLbl);

  // Harmony
  if(p.isHarmony){
    const hg=buildHarmony();wrap.appendChild(hg);
  }

  return wrap;
}

function drawEQCurve(cv,p){
  const ctx=cv.getContext('2d');const w=cv.width,h=80;
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  for(let x=0;x<w;x+=w/8){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();
  ctx.beginPath();
  for(let x=0;x<w;x++){
    const f=x/w;
    let y2=h/2;
    if(p.params[0])y2-=(p.params[0].v-0.5)*20*Math.exp(-Math.pow(f-0.05,2)/0.004);
    if(p.params[1])y2-=(p.params[1].v-0.5)*18*Math.exp(-Math.pow(f-0.25,2)/0.008);
    if(p.params[2])y2-=(p.params[2].v-0.5)*18*Math.exp(-Math.pow(f-0.6,2)/0.008);
    if(p.params[3])y2-=(p.params[3].v-0.5)*16*Math.exp(-Math.pow(f-0.92,2)/0.005);
    x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  }
  ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
  ctx.lineTo(w,h/2);ctx.lineTo(0,h/2);ctx.closePath();
  ctx.fillStyle=hexA(p.color,0.08);ctx.fill();
  ctx.lineWidth=1;
}

function buildHarmony(){
  const hg=document.createElement('div');hg.className='harmony-grid';
  const VOICES=['Voice 1','Voice 2','Voice 3','Voice 4'];
  const INTERVALS=['-Oct','-7th','-6th','-5th','-4th','-3rd','-2nd','Unison','+2nd','+3rd','+4th','+5th','+6th','+7th','+Oct'];
  VOICES.forEach((v,vi)=>{
    const card=document.createElement('div');card.className='voice-card';
    card.innerHTML=`
      <div class="voice-title">${v}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="font-size:9px;color:var(--sub)">Interval</span>
        <select style="background:var(--bg4);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 4px;font-size:9px;font-family:inherit;flex:1">
          ${INTERVALS.map((iv2,ii)=>`<option ${ii===7?'selected':''}>${iv2}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
        <span style="font-size:8px;color:var(--sub);width:30px">Vol</span>
        <input type="range" min="0" max="100" value="${60+vi*5}" style="flex:1;accent-color:var(--pink)">
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:8px;color:var(--sub);width:30px">Pan</span>
        <input type="range" min="-100" max="100" value="${(vi-1.5)*30}" style="flex:1;accent-color:var(--blue)">
      </div>
    `;
    hg.appendChild(card);
  });
  return hg;
}

// ── BYPASS ──
function toggleBypass(i,e){
  if(e)e.stopPropagation();
  plugins[i].power=!plugins[i].power;
  buildChainBar();buildChainList();
  // update panel LED
  const panel=document.getElementById('pp'+i);
  if(panel){
    const led=panel.querySelector('.pp-power-led');
    if(led){led.style.background=plugins[i].power?plugins[i].color:'var(--sub)';led.style.color=plugins[i].power?plugins[i].color:'var(--sub)';}
  }
}
function bypassAll(){plugins.forEach((_,i)=>{plugins[i].power=false;});buildChainBar();buildChainList();buildPlugins();}
function enableAll(){plugins.forEach((_,i)=>{plugins[i].power=true;});buildChainBar();buildChainList();buildPlugins();}
function resetAll(){plugins.forEach(p=>{p.params.forEach(pm=>{pm.v=0.5;});});buildPlugins();}

function scrollToPlugin(i){
  const panel=document.getElementById('pp'+i);
  if(panel)panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── PITCH SIMULATION ──
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OCTAVES=[3,4,4,4,4,4,5];
let pitchInterval=null;
function simPitch(){
  const n=NOTES[Math.floor(Math.random()*12)];
  const o=OCTAVES[Math.floor(Math.random()*OCTAVES.length)];
  const cents=Math.round((Math.random()-0.5)*40);
  document.getElementById('pitchNote').textContent=n+o;
  const pct=50+cents/40*50;
  const bar=document.getElementById('pitchCentsBar');
  bar.style.width=pct+'%';
  bar.style.background=Math.abs(cents)<8?'var(--green)':Math.abs(cents)<20?'var(--gold)':'var(--red)';
  document.getElementById('pitchInfo').textContent=(cents>0?'+':'')+cents+' cents';
}

// ── WAVEFORM ──
let wavePhase=0;
function drawWaveform(){
  const cv=document.getElementById('waveform-canvas');
  if(!cv)return;
  cv.width=cv.offsetWidth||120;cv.height=70;
  const ctx=cv.getContext('2d');const w=cv.width,h=70;
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  ctx.beginPath();
  for(let x=0;x<w;x++){
    const v=0.4*Math.sin(x*0.12+wavePhase)+0.15*Math.sin(x*0.31+wavePhase*1.4)+0.08*(Math.random()-0.5);
    const y2=h/2-v*h*0.38;
    x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2);
  }
  ctx.strokeStyle='rgba(212,160,60,0.8)';ctx.lineWidth=1.5;ctx.stroke();ctx.lineWidth=1;
  wavePhase+=0.05;
}

// ── GR METERS ──
function animGR(){
  plugins.forEach((p,i)=>{
    const fill=document.getElementById('grfull'+i);
    const val=document.getElementById('grval'+i);
    const fill2=document.getElementById('grfill'+i);
    const hasComp=['Compressor','MB Comp','Limiter','De-Esser','Vocal Suite'].includes(p.type);
    const pct=p.power&&hasComp?(Math.random()*35):0;
    if(fill){fill.style.width=pct+'%';fill.style.background=pct>25?'var(--red)':pct>12?'var(--gold)':'var(--green)';}
    if(val)val.textContent=(-pct/10).toFixed(1)+' dB';
    if(fill2){fill2.style.width=pct+'%';fill2.style.background=pct>25?'var(--red)':pct>12?'var(--gold)':'var(--green)';}
  });
  const inH=55+Math.random()*40,outH=50+Math.random()*40;
  const mIn=document.getElementById('mIn'),mOut=document.getElementById('mOut');
  if(mIn)mIn.style.height=inH+'%';if(mOut)mOut.style.height=outH+'%';
}

// ── PRESETS ──
const PRESETS=['Lead Vocal','Rap Vocal','Pop Female','R&B Smooth','Rock Grit','Lo-Fi Tape','Broadcast','Whisper'];
function buildPresets(){
  const el=document.getElementById('presets-list');
  el.innerHTML=PRESETS.map(pr=>`
    <div style="padding:5px 6px;margin-bottom:3px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:10px;transition:all .2s" onmouseenter="this.style.borderColor='var(--gold)'" onmouseleave="this.style.borderColor='var(--border)'" onclick="loadPreset('${pr}')">
      🎤 ${pr}
    </div>
  `).join('');
}
function loadPreset(name){
  plugins.forEach(p=>{p.params.forEach(pm=>{pm.v=0.3+Math.random()*0.5;});});
  buildPlugins();buildChainBar();
  alert('Preset "'+name+'" loaded!');
}
function aiOptimize(){
  plugins.forEach(p=>{
    if(p.type==='Compressor'){p.params.forEach(pm=>{pm.v=0.5+Math.random()*0.3;});}
    if(p.type.includes('EQ')){p.params.forEach(pm=>{pm.v=0.4+Math.random()*0.3;});}
  });
  buildPlugins();alert('AI optimization applied! Settings tuned for your vocal.');
}

// ── UTILS ──
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

// ── INIT ──
function init(){
  buildChainBar();
  buildChainList();
  buildPlugins();
  buildPresets();
  setInterval(simPitch,900);
  setInterval(animGR,100);
  setInterval(drawWaveform,50);
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
