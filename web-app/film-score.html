<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GOAT Film Score — Orchestral Suite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1420;--bg3:#111928;--bg4:#1a2336;
  --border:rgba(212,160,60,0.18);--gold:#d4a03c;--gold2:#f0c040;
  --red:#e74c3c;--green:#2ecc71;--blue:#3498db;--purple:#9b59b6;
  --cyan:#00d4ff;--orange:#f39c12;--pink:#e91e8c;
  --text:#f0ece4;--sub:#7a7060;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px}
#app{display:flex;flex-direction:column;height:100vh}
/* TOPBAR */
#topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.logo{font-size:15px;font-weight:800;color:var(--gold)}
.tb-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.tb-btn:hover,.tb-btn.act{background:var(--bg4);color:var(--text);border-color:var(--gold)}
.spacer{flex:1}
/* TOP INFO BAR */
#infobar{height:32px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 14px;flex-shrink:0;overflow-x:auto}
.info-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.info-lbl{font-size:9px;color:var(--sub)}
.info-val{font-size:10px;font-weight:700;color:var(--text)}
.spec-canvas{display:block}
/* TABS */
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab{padding:8px 18px;font-size:11px;cursor:pointer;color:var(--sub);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.act{color:var(--gold);border-bottom-color:var(--gold)}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}
/* ORCH PANEL */
#orch-panel{width:200px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sect-header{height:28px;display:flex;align-items:center;padding:0 10px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .2s;gap:6px}
.sect-header:hover{background:var(--bg4)}
.inst-row{height:36px;display:flex;align-items:center;padding:0 8px;border-bottom:1px solid rgba(255,255,255,0.04);gap:5px;cursor:pointer;transition:all .2s}
.inst-row:hover,.inst-row.sel{background:var(--bg4)}
.inst-row.sel .inst-name{color:var(--gold)}
.inst-name{font-size:10px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-btn{width:16px;height:16px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit}
.ms-btn.m.on{border-color:var(--orange);color:var(--orange);background:rgba(243,156,18,.15)}
.ms-btn.s.on{border-color:var(--green);color:var(--green);background:rgba(46,204,113,.15)}
.inst-meter{width:24px;height:6px;background:var(--bg4);border-radius:2px;overflow:hidden}
.inst-meter-fill{height:100%;border-radius:2px;transition:width .08s}
/* CENTER */
#center{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
/* TRANSPORT */
#transport{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.t-btn{width:30px;height:28px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}
.t-btn:hover{background:var(--bg4);border-color:var(--gold)}
.t-btn.act{background:rgba(46,204,113,0.2);border-color:var(--green);color:var(--green)}
.pos-box{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--cyan);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 10px;min-width:100px;text-align:center}
.bpm-box{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px}
/* SCORE VIEW */
#score-wrap{flex:1;overflow:auto;background:var(--bg)}
#score-canvas{display:block}
/* PIANO ROLL VIEW */
#roll-view{flex:1;overflow:hidden;display:flex;display:none}
#keys-cv{display:block;flex-shrink:0}
#roll-cv{display:block;flex:1;cursor:crosshair}
/* MIX VIEW */
#mix-view{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;padding:10px;gap:6px;display:none}
.mix-ch{width:58px;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 4px;flex-shrink:0}
.mix-name{font-size:8px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.mix-meter{width:12px;height:60px;background:var(--bg4);border-radius:3px;position:relative;overflow:hidden}
.mix-fill{width:100%;position:absolute;bottom:0;background:linear-gradient(to top,var(--green),var(--gold),var(--red));border-radius:3px;transition:height .07s}
.mix-fader{width:44px;height:6px;background:var(--bg4);border-radius:3px;cursor:pointer}
/* RIGHT PANEL */
#right{width:210px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:10px}
.rp-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:10px}
.ai-action-btn{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:10px;font-family:inherit;transition:all .2s;text-align:left;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ai-action-btn:hover{border-color:var(--purple);color:var(--purple);background:rgba(155,89,182,.1)}
</style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <span class="logo">🐐 FILM SCORE</span>
    <div class="spacer"></div>
    <button class="tb-btn" onclick="newScore()">📄 New</button>
    <button class="tb-btn" onclick="openScore()">📂 Open</button>
    <button class="tb-btn" onclick="exportMidi()">📤 MIDI Export</button>
    <button class="tb-btn" onclick="exportAudio()">🔊 Audio Render</button>
    <div class="spacer"></div>
    <a href="movie-studio.html"><button class="tb-btn">🎬 Video</button></a>
    <a href="powerhouse.html"><button class="tb-btn">⬅ Home</button></a>
  </div>

  <!-- INFO BAR -->
  <div id="infobar">
    <div class="info-item"><span class="info-lbl">Project:</span><span class="info-val">GOAT Season OST</span></div>
    <div class="info-item"><span class="info-lbl">Key:</span><span class="info-val" id="keyInfo">A Minor</span></div>
    <div class="info-item"><span class="info-lbl">Time:</span><span class="info-val">4/4</span></div>
    <div class="info-item"><span class="info-lbl">Tempo:</span><span class="info-val" id="tempoInfo">90 BPM</span></div>
    <div class="info-item"><span class="info-lbl">Duration:</span><span class="info-val">4:32</span></div>
    <div class="info-item"><span class="info-lbl">Bars:</span><span class="info-val">64</span></div>
    <div class="spacer"></div>
    <canvas id="spec-canvas" class="spec-canvas" width="120" height="28"></canvas>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab act" onclick="switchView('score',this)">Score</div>
    <div class="tab" onclick="switchView('roll',this)">Piano Roll</div>
    <div class="tab" onclick="switchView('mix',this)">Mix</div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- ORCH PANEL -->
    <div id="orch-panel" id="orch-list"></div>

    <!-- CENTER -->
    <div id="center">
      <!-- TRANSPORT -->
      <div id="transport">
        <button class="t-btn" onclick="gotoBar(1)">⏮</button>
        <button class="t-btn" id="btnPlay" onclick="togglePlay()">▶</button>
        <button class="t-btn" onclick="stopScore()">⏹</button>
        <button class="t-btn" id="btnLoop" onclick="toggleLoop()">🔁</button>
        <div class="spacer"></div>
        <span class="pos-box" id="posBox">001 | 1</span>
        <div class="spacer"></div>
        <div class="bpm-box">
          <span style="font-size:9px;color:var(--sub)">BPM</span>
          <span style="font-size:16px;font-weight:700;color:var(--gold);cursor:ew-resize;user-select:none" id="bpmVal">90</span>
        </div>
        <select id="keySelect" onchange="changeKey()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 6px;font-family:inherit;font-size:10px">
          ${['C Maj','G Maj','D Maj','A Maj','F Maj','Bb Maj','A Min','E Min','D Min','G Min','C Min'].map(k=>`<option ${k==='A Min'?'selected':''}>${k}</option>`).join('')}
        </select>
        <button class="tb-btn" style="margin-left:6px" onclick="addBar()">+ Bar</button>
        <button class="tb-btn" onclick="removeBar()">- Bar</button>
      </div>

      <!-- SCORE -->
      <div id="score-wrap">
        <canvas id="score-canvas"></canvas>
      </div>
      <!-- PIANO ROLL -->
      <div id="roll-view">
        <canvas id="keys-cv" width="52"></canvas>
        <canvas id="roll-cv"></canvas>
      </div>
      <!-- MIX -->
      <div id="mix-view"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right">
      <div class="rp-title">🤖 AI Composer</div>
      <button class="ai-action-btn" onclick="aiAction('chord')"><span>🎵</span>Generate Chords</button>
      <button class="ai-action-btn" onclick="aiAction('melody')"><span>🎶</span>Create Melody</button>
      <button class="ai-action-btn" onclick="aiAction('counter')"><span>🎼</span>Counterpoint</button>
      <button class="ai-action-btn" onclick="aiAction('orch')"><span>🎻</span>Auto-Orchestrate</button>
      <button class="ai-action-btn" onclick="aiAction('mod')"><span>🔀</span>Modulation</button>
      <button class="ai-action-btn" onclick="aiAction('harm')"><span>✨</span>Harmonize</button>

      <div class="rp-title">🎻 Libraries</div>
      <div style="display:flex;flex-direction:column;gap:3px" id="lib-list"></div>

      <div class="rp-title">📝 Notation</div>
      <div style="font-size:10px;color:var(--sub);line-height:2">
        Time Sig: <span style="color:var(--text)">4/4</span><br>
        Clef: <span style="color:var(--text)">Treble / Bass</span><br>
        Accidentals: <span style="color:var(--text)">3 flats</span><br>
        Articulation: <span style="color:var(--text)">Legato</span>
      </div>

      <div class="rp-title">🎚 Master</div>
      <div style="font-size:9px;color:var(--sub);margin-bottom:4px">Reverb Hall</div>
      <input type="range" min="0" max="100" value="45" style="width:100%;accent-color:var(--blue);margin-bottom:6px">
      <div style="font-size:9px;color:var(--sub);margin-bottom:4px">Room Size</div>
      <input type="range" min="0" max="100" value="70" style="width:100%;accent-color:var(--purple);margin-bottom:6px">
      <div style="font-size:9px;color:var(--sub);margin-bottom:4px">Depth</div>
      <input type="range" min="0" max="100" value="55" style="width:100%;accent-color:var(--cyan)">
    </div>
  </div>
</div>

<script>
// ── DATA ──
const sections = [
  {name:'Strings',    color:'#3498db', icon:'🎻', instruments:[
    {n:'Violin I',   m:false,s:false},{n:'Violin II',  m:false,s:false},
    {n:'Viola',      m:false,s:false},{n:'Cello',      m:false,s:false},{n:'Double Bass',m:false,s:false}
  ]},
  {name:'Woodwinds', color:'#2ecc71', icon:'🪈', instruments:[
    {n:'Flute',      m:false,s:false},{n:'Oboe',       m:false,s:false},
    {n:'Clarinet',   m:false,s:false},{n:'Bassoon',    m:false,s:false}
  ]},
  {name:'Brass',     color:'#f39c12', icon:'🎺', instruments:[
    {n:'French Horn',m:false,s:false},{n:'Trumpet',    m:false,s:false},
    {n:'Trombone',   m:false,s:false},{n:'Tuba',       m:false,s:false}
  ]},
  {name:'Percussion',color:'#e74c3c', icon:'🥁', instruments:[
    {n:'Timpani',    m:false,s:false},{n:'Perc. Kit',  m:false,s:false},
    {n:'Xylophone',  m:false,s:false},{n:'Cymbals',    m:false,s:false}
  ]},
  {name:'Keys/Choir',color:'#9b59b6', icon:'🎹', instruments:[
    {n:'Piano',      m:false,s:false},{n:'Organ',      m:false,s:false},
    {n:'Choir Ah',   m:false,s:false}
  ]},
  {name:'Solo/FX',   color:'#e91e8c', icon:'✨', instruments:[
    {n:'Solo Violin',m:false,s:false},{n:'Solo Cello', m:false,s:false},
    {n:'Synth Pad',  m:false,s:false},{n:'FX / Riser', m:false,s:false}
  ]},
];

const allInsts = sections.flatMap(s=>s.instruments.map(i=>({...i,section:s.name,color:s.color,icon:s.icon})));
const rollNotes = Array.from({length:allInsts.length},()=>[]);

let playing=false, looping=false, bpm=90, currentBar=1, totalBars=64;
let selectedInst=0, currentView='score';
let rafId=null, scoreAnimPos=0;

// ── ORCH PANEL ──
function buildOrchPanel(){
  const el=document.getElementById('orch-panel');
  el.innerHTML='';
  sections.forEach(sect=>{
    const hdr=document.createElement('div');hdr.className='sect-header';
    hdr.innerHTML=`<span>${sect.icon}</span><span style="color:${sect.color};flex:1">${sect.name}</span><span style="font-size:10px">${sect.instruments.length}</span>`;
    el.appendChild(hdr);
    sect.instruments.forEach((inst,li)=>{
      const globalIdx=allInsts.findIndex(i=>i.n===inst.n&&i.section===sect.name);
      const row=document.createElement('div');
      row.className='inst-row'+(globalIdx===selectedInst?' sel':'');
      row.innerHTML=`
        <div style="width:3px;height:24px;background:${sect.color};border-radius:2px;flex-shrink:0"></div>
        <span class="inst-name">${inst.n}</span>
        <button class="ms-btn m ${inst.m?'on':''}" onclick="toggleM(${globalIdx},event)">M</button>
        <button class="ms-btn s ${inst.s?'on':''}" onclick="toggleS(${globalIdx},event)">S</button>
        <div class="inst-meter"><div class="inst-meter-fill" id="im${globalIdx}" style="width:${50+Math.random()*40}%;background:${sect.color}"></div></div>
      `;
      row.onclick=()=>{selectedInst=globalIdx;buildOrchPanel();if(currentView==='roll')drawRoll();};
      el.appendChild(row);
    });
  });
}

function toggleM(i,e){e.stopPropagation();allInsts[i].m=!allInsts[i].m;buildOrchPanel();}
function toggleS(i,e){e.stopPropagation();allInsts[i].s=!allInsts[i].s;buildOrchPanel();}

// ── SCORE CANVAS ──
function drawScore(){
  const wrap=document.getElementById('score-wrap');
  const cv=document.getElementById('score-canvas');
  const W=Math.max(wrap.clientWidth||700, 800);
  const SECTION_H=80, STAFF_H=50, STAFF_TOP=18, LINE_GAP=8;
  const H=sections.length*SECTION_H+40;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');

  // paper background
  ctx.fillStyle='#0b1016';ctx.fillRect(0,0,W,H);
  // subtle paper texture lines
  ctx.strokeStyle='rgba(255,255,255,0.015)';
  for(let y=0;y<H;y+=3){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const BARS_PER_SYSTEM=8;
  const BAR_W=(W-80)/BARS_PER_SYSTEM;

  sections.forEach((sect,si)=>{
    const sy=si*SECTION_H+20;

    // system brace
    ctx.strokeStyle=hexA(sect.color,0.5);ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(14,sy);ctx.bezierCurveTo(8,sy+SECTION_H*0.2,4,sy+SECTION_H*0.45,8,sy+SECTION_H/2);
    ctx.bezierCurveTo(4,sy+SECTION_H*0.55,8,sy+SECTION_H*0.8,14,sy+SECTION_H);ctx.stroke();ctx.lineWidth=1;

    // section label (rotated)
    ctx.save();ctx.translate(12,sy+SECTION_H/2);ctx.rotate(-Math.PI/2);
    ctx.fillStyle=sect.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText(sect.name,0,0);ctx.restore();

    // 5-line staff
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
    for(let ln=0;ln<5;ln++){
      const y2=sy+STAFF_TOP+ln*LINE_GAP;
      ctx.beginPath();ctx.moveTo(24,y2);ctx.lineTo(W-10,y2);ctx.stroke();
    }

    // clef symbol
    ctx.fillStyle=hexA(sect.color,0.7);ctx.font='24px serif';
    const isBass=sect.name==='Brass'||sect.name==='Solo/FX';
    ctx.fillText(isBass?'𝄢':'𝄞',26,sy+STAFF_TOP+28);

    // key signature (3 flats for A minor)
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='14px serif';
    ['b','b','b'].forEach((acc,ai)=>{ctx.fillText(acc,56+ai*8,sy+STAFF_TOP+LINE_GAP*(ai%2===0?1:3));});

    // time signature
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 14px serif';
    ctx.fillText('4',80,sy+STAFF_TOP+14);ctx.fillText('4',80,sy+STAFF_TOP+30);

    // bar lines
    for(let b=0;b<=BARS_PER_SYSTEM;b++){
      const bx=92+b*BAR_W;
      ctx.strokeStyle=b===0||b===BARS_PER_SYSTEM?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.12)';
      ctx.lineWidth=b===BARS_PER_SYSTEM?2:1;
      ctx.beginPath();ctx.moveTo(bx,sy+STAFF_TOP);ctx.lineTo(bx,sy+STAFF_TOP+4*LINE_GAP);ctx.stroke();
      ctx.lineWidth=1;

      // notes in this bar
      if(b<BARS_PER_SYSTEM){
        const BEAT_W=BAR_W/4;
        for(let beat=0;beat<4;beat++){
          const hasNote=Math.random()>0.35;
          if(!hasNote)continue;
          const nx=bx+beat*BEAT_W+BEAT_W*0.3;
          const noteLines=[0,1,2,3,4];
          const nl=noteLines[Math.floor(Math.random()*noteLines.length)];
          const ny=sy+STAFF_TOP+nl*LINE_GAP-3;
          // note head
          ctx.fillStyle=hexA(sect.color,0.85);
          ctx.beginPath();ctx.ellipse(nx,ny,4,3,Math.PI*0.1,0,Math.PI*2);ctx.fill();
          // stem
          ctx.strokeStyle=hexA(sect.color,0.7);ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(nx+4,ny);ctx.lineTo(nx+4,ny-20);ctx.stroke();
          ctx.lineWidth=1;
          // ledger line if needed
          if(nl>=5){ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(nx-6,ny+3);ctx.lineTo(nx+10,ny+3);ctx.stroke();}
        }
      }
    }

    // double bar at end
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    const ex=92+BARS_PER_SYSTEM*BAR_W;
    ctx.beginPath();ctx.moveTo(ex,sy+STAFF_TOP);ctx.lineTo(ex,sy+STAFF_TOP+4*LINE_GAP);ctx.stroke();
    ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(ex+4,sy+STAFF_TOP);ctx.lineTo(ex+4,sy+STAFF_TOP+4*LINE_GAP);ctx.stroke();
    ctx.lineWidth=1;

    // bar numbers
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='8px monospace';
    for(let b=0;b<BARS_PER_SYSTEM;b++){ctx.fillText(b+1,94+b*BAR_W,sy+6);}
  });

  // playhead
  if(playing){
    const ph=92+(currentBar-1)%BARS_PER_SYSTEM*(W-102)/BARS_PER_SYSTEM;
    ctx.strokeStyle='rgba(231,76,60,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ph,16);ctx.lineTo(ph,H-10);ctx.stroke();ctx.lineWidth=1;
  }
}

// ── PIANO ROLL ──
const NOTE_H=12, BEAT_W=40, TOTAL_BEATS=64;
let rollDrag=false, rollDragNote=null, rollTool='draw';
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function drawPianoKeys(){
  const cv=document.getElementById('keys-cv');
  const total=88;cv.height=total*NOTE_H;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#111928';ctx.fillRect(0,0,52,cv.height);
  for(let n=0;n<total;n++){
    const noteIdx=(total-1-n)%12;
    const isBlack=[1,3,6,8,10].includes(noteIdx);
    const y=n*NOTE_H;
    ctx.fillStyle=isBlack?'#1a1a2e':'#f0ece4';
    ctx.fillRect(0,y+1,52,NOTE_H-1);
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.strokeRect(0,y,52,NOTE_H);
    if(noteIdx===0){
      const oct=Math.floor((total-1-n)/12);
      ctx.fillStyle=isBlack?'#aaa':'#555';ctx.font='7px monospace';
      ctx.fillText('C'+oct,2,y+NOTE_H-2);
    }
  }
}

function drawRoll(){
  const cv=document.getElementById('roll-cv');
  const total=88;const w=BEAT_W*TOTAL_BEATS,h=total*NOTE_H;
  cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#080c14';ctx.fillRect(0,0,w,h);
  for(let n=0;n<total;n++){
    const noteIdx=(total-1-n)%12;
    const isBlack=[1,3,6,8,10].includes(noteIdx);
    const y=n*NOTE_H;
    ctx.fillStyle=isBlack?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.015)';
    ctx.fillRect(0,y,w,NOTE_H);
  }
  for(let b=0;b<=TOTAL_BEATS;b++){
    const x=b*BEAT_W;
    ctx.strokeStyle=b%4===0?'rgba(212,160,60,0.2)':'rgba(255,255,255,0.04)';
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
    if(b%4===0&&b<TOTAL_BEATS){
      ctx.fillStyle='rgba(212,160,60,0.4)';ctx.font='8px monospace';
      ctx.fillText(b/4+1,x+2,h-4);
    }
  }
  const notes=rollNotes[selectedInst]||[];
  const inst=allInsts[selectedInst];
  notes.forEach(note=>{
    const y=note.pitch*NOTE_H;const x=note.beat*BEAT_W;const nw=note.len*BEAT_W-2;
    ctx.fillStyle=hexA(inst.color,0.8);
    rRect(ctx,x+1,y+2,nw,NOTE_H-4,2);ctx.fill();
    ctx.strokeStyle=inst.color;ctx.lineWidth=1;rRect(ctx,x+1,y+2,nw,NOTE_H-4,2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 7px monospace';
    ctx.fillText(NOTE_NAMES[(total-1-note.pitch)%12],x+3,y+NOTE_H-3);
  });
  ctx.lineWidth=1;
  document.getElementById('keys-cv').style.height=h+'px';
  drawPianoKeys();
}

function rRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── MIX VIEW ──
function buildMixView(){
  const el=document.getElementById('mix-view');
  el.innerHTML='';
  allInsts.forEach((inst,i)=>{
    const ch=document.createElement('div');ch.className='mix-ch';
    ch.innerHTML=`
      <div class="mix-meter"><div class="mix-fill" id="mf${i}" style="height:${40+Math.random()*50}%"></div></div>
      <canvas id="mk${i}" width="36" height="22" style="cursor:ns-resize"></canvas>
      <div class="mix-fader"><input type="range" min="0" max="100" value="${65+Math.random()*25}" style="width:100%;accent-color:${inst.color}"></div>
      <div class="mix-name" style="color:${inst.color}" title="${inst.n}">${inst.icon} ${inst.n.split(' ')[0]}</div>
    `;
    el.appendChild(ch);
  });
  // master
  const mst=document.createElement('div');mst.className='mix-ch';mst.style.background='rgba(212,160,60,0.05)';
  mst.innerHTML=`<div class="mix-meter"><div class="mix-fill" id="mfM" style="height:65%"></div></div><div class="mix-name" style="color:var(--gold)">MASTER</div>`;
  el.appendChild(mst);
  // draw pan knobs
  allInsts.forEach((inst,i)=>{
    const cv2=document.getElementById('mk'+i);if(!cv2)return;
    drawMiniKnob(cv2,0.5,inst.color);
  });
}

function drawMiniKnob(cv2,val,color){
  const ctx=cv2.getContext('2d');const cx=18,cy=11,r=9;
  ctx.clearRect(0,0,36,22);
  ctx.beginPath();ctx.arc(cx,cy,r,-2.4,0.7);ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=3;ctx.stroke();
  const a=-2.4+val*3.1;
  ctx.beginPath();ctx.arc(cx,cy,r,-2.4,a);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
  const dx=cx+r*0.65*Math.cos(a),dy=cy+r*0.65*Math.sin(a);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(dx,dy);ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
}

// ── SPECTRUM ──
function drawSpectrum(){
  const cv=document.getElementById('spec-canvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');const w=120,h=28;
  ctx.fillStyle='#111928';ctx.fillRect(0,0,w,h);
  const bars=24;
  for(let b=0;b<bars;b++){
    const barH=playing?(4+Math.random()*22):(1+Math.random()*3);
    const hue=220+b*6;
    ctx.fillStyle=`hsl(${hue},70%,55%)`;
    ctx.fillRect(b*(w/bars)+1,h-barH,w/bars-2,barH);
  }
}

// ── TRANSPORT ──
function togglePlay(){
  playing=!playing;
  document.getElementById('btnPlay').classList.toggle('act',playing);
  document.getElementById('btnPlay').textContent=playing?'⏸':'▶';
}
function stopScore(){playing=false;currentBar=1;document.getElementById('btnPlay').classList.remove('act');document.getElementById('btnPlay').textContent='▶';}
function toggleLoop(){looping=!looping;document.getElementById('btnLoop').classList.toggle('act',looping);}
function gotoBar(b){currentBar=b;}
function addBar(){totalBars++;drawScore();}
function removeBar(){if(totalBars>4){totalBars--;drawScore();}}
function changeKey(){document.getElementById('keyInfo').textContent=document.getElementById('keySelect').value;}

// ── BPM DRAG ──
function setupBpmDrag(){
  const el=document.getElementById('bpmVal');
  let drag=false,sx=0,sv=bpm;
  el.addEventListener('mousedown',e=>{drag=true;sx=e.clientX;sv=bpm;e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!drag)return;bpm=Math.max(40,Math.min(240,sv+Math.round((e.clientX-sx)/3)));el.textContent=bpm;document.getElementById('tempoInfo').textContent=bpm+' BPM';});
  document.addEventListener('mouseup',()=>drag=false);
}

// ── LIBRARIES ──
function buildLibList(){
  const el=document.getElementById('lib-list');
  const libs=[
    {n:'EastWest Hollywood',c:'#d4a03c',on:true},
    {n:'Spitfire BBCSO',    c:'#3498db',on:true},
    {n:'NI Komplete Orch.', c:'#9b59b6',on:true},

  el.innerHTML=libs.map(l=>`
    <div style="display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .2s;font-size:10px;margin-bottom:3px" onmouseenter="this.style.borderColor='${l.c}'" onmouseleave="this.style.borderColor='var(--border)'">
      <div style="width:8px;height:8px;border-radius:50%;background:${l.on?l.c:'var(--sub)'};box-shadow:${l.on?'0 0 4px '+l.c:'none'}"></div>
      <span style="flex:1">${l.n}</span>
      <span style="font-size:9px;color:${l.on?'var(--green)':'var(--sub)'}">${l.on?'LOADED':'—'}</span>

// ── VIEW SWITCH ──
function switchView(view,el){
  currentView=view;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  document.getElementById('score-wrap').style.display=view==='score'?'block':'none';
  document.getElementById('roll-view').style.display=view==='roll'?'flex':'none';
  document.getElementById('mix-view').style.display=view==='mix'?'flex':'none';
  if(view==='score')drawScore();
  if(view==='roll'){drawPianoKeys();drawRoll();initRollEvents();}
  if(view==='mix')buildMixView();
}

// ── ROLL EVENTS ──
let rollEventsInit=false;
function initRollEvents(){
  if(rollEventsInit)return;rollEventsInit=true;
  const cv=document.getElementById('roll-cv');
  cv.addEventListener('mousedown',e=>{
    rollDrag=true;
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left,y=e.clientY-rect.top;
    const beat=Math.floor(x/BEAT_W/0.5)*0.5, pitch=Math.floor(y/NOTE_H);
    if(rollTool==='draw'){
      rollDragNote={pitch,beat,len:0.5};
      (rollNotes[selectedInst]=rollNotes[selectedInst]||[]).push(rollDragNote);
    } else {
      rollNotes[selectedInst]=(rollNotes[selectedInst]||[]).filter(n=>!(n.pitch===pitch&&n.beat<=beat&&n.beat+n.len>beat));
    }
    drawRoll();
  });
  cv.addEventListener('mousemove',e=>{
    if(!rollDrag||!rollDragNote)return;
    const rect=cv.getBoundingClientRect();
    const x=e.clientX-rect.left;
    rollDragNote.len=Math.max(0.5,Math.floor(x/BEAT_W/0.5)*0.5-rollDragNote.beat);
    drawRoll();
  });
  cv.addEventListener('mouseup',()=>{rollDrag=false;rollDragNote=null;});
  cv.addEventListener('contextmenu',e=>{
    e.preventDefault();rollTool=rollTool==='draw'?'erase':'draw';
  });
}

// ── METER ANIM ──
function animMeters(){
  allInsts.forEach((_,i)=>{
    const el=document.getElementById('im'+i);
    if(el){el.style.width=(playing?(15+Math.random()*80):(1+Math.random()*5))+'%';}
    const mf=document.getElementById('mf'+i);
    if(mf){mf.style.height=(playing?(20+Math.random()*70):(2+Math.random()*4))+'%';}
  });
  const mM=document.getElementById('mfM');if(mM)mM.style.height=(playing?(50+Math.random()*45):(2+Math.random()*4))+'%';
}

// ── UTILS ──
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function newScore(){alert('New Score\n[Opens template selector]');}
function openScore(){alert('Open Score\n[Opens file browser]');}
function exportMidi(){alert('MIDI Export\n• Full Score MIDI\n• Per-instrument MIDI\n• DAW template\n\n[Connect to MIDI export engine]');}
function exportAudio(){alert('Audio Render\n• WAV 24-bit Stereo\n• Stems per section\n• MP3 320kbps\n\n[Connect to audio render engine]');}

// ── MAIN LOOP ──
let lastTs2=0;
function loop2(ts){
  if(playing&&ts&&lastTs2){
    const dt=(ts-lastTs2)/1000;
    scoreAnimPos+=dt*bpm/60;
    currentBar=Math.floor(scoreAnimPos/4)+1;
    if(currentBar>totalBars){if(looping){scoreAnimPos=0;currentBar=1;}else{playing=false;document.getElementById('btnPlay').textContent='▶';}}
    document.getElementById('posBox').textContent=String(currentBar).padStart(3,'0')+' | '+((Math.floor(scoreAnimPos)%4)+1);
  }
  lastTs2=ts;
  if(currentView==='score')drawScore();
  drawSpectrum();
  animMeters();
  rafId=requestAnimationFrame(loop2);
}

// ── INIT ──
function init(){
  buildOrchPanel();
  drawScore();
  setupBpmDrag();
  buildLibList();
  requestAnimationFrame(loop2);
}
window.addEventListener('DOMContentLoaded',init);
window.addEventListener('resize',()=>{if(currentView==='score')drawScore();});
</script>
