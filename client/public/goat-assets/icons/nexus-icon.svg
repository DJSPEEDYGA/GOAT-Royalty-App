<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nexusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="oracleGlow">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a" rx="64"/>
  
  <!-- Oracle Intelligence Background -->
  <circle cx="256" cy="256" r="180" fill="url(#oracleGlow)"/>
  <circle cx="256" cy="256" r="120" fill="url(#nexusGradient)" opacity="0.2"/>
  
  <!-- Data Grid Pattern -->
  <g opacity="0.3">
    <line x1="100" y1="100" x2="100" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="200" y1="100" x2="200" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="300" y1="100" x2="300" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="400" y1="100" x2="400" y2="400" stroke="#00d4ff" stroke-width="1"/>
    <line x1="100" y1="200" x2="400" y2="200" stroke="#00d4ff" stroke-width="1"/>
    <line x1="100" y1="300" x2="400" y2="300" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Main N Letter -->
  <text x="256" y="350" 
        font-family="Arial Black, sans-serif" 
        font-size="280" 
        font-weight="900" 
        text-anchor="middle" 
        fill="url(#nexusGradient)"
        filter="url(#glow)">
    N
  </text>
  
  <!-- Data Points -->
  <g fill="#00d4ff" opacity="0.8">
    <circle cx="120" cy="120" r="4">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="392" cy="150" r="3">
      <animate attributeName="r" values="3;5;3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="392" r="5">
      <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="350" r="3">
      <animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="#0099cc" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 120 120 L 256 256 L 392 150">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 150 392 L 256 256 L 380 350">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Oracle Ring -->
  <circle cx="256" cy="256" r="200" 
          stroke="url(#nexusGradient)" 
          stroke-width="3" 
          fill="none" 
          opacity="0.8">
    <animate attributeName="r" values="200;210;200" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Label -->
  <text x="256" y="480" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#00d4ff">
    NEXUS
  </text>
  <text x="256" y="500" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        text-anchor="middle" 
        fill="#0099cc">
    ORACLE
  </text>
</svg>