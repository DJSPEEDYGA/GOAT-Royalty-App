<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lexiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8338ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a86ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a" rx="64"/>
  
  <!-- Creative Spark Background -->
  <circle cx="256" cy="256" r="200" fill="url(#lexiGradient)" opacity="0.2"/>
  <circle cx="256" cy="256" r="150" fill="url(#lexiGradient)" opacity="0.3"/>
  
  <!-- Main L Letter -->
  <text x="256" y="350" 
        font-family="Arial Black, sans-serif" 
        font-size="280" 
        font-weight="900" 
        text-anchor="middle" 
        fill="url(#lexiGradient)"
        filter="url(#glow)">
    L
  </text>
  
  <!-- Spark Elements -->
  <g fill="#ff006e" opacity="0.8">
    <circle cx="150" cy="150" r="4">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="362" cy="180" r="3">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="362" r="5">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="320" r="3">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Creative Waves -->
  <path d="M 100 400 Q 200 380, 300 400 T 500 400" 
        stroke="#8338ec" 
        stroke-width="3" 
        fill="none" 
        opacity="0.6">
    <animate attributeName="d" 
             values="M 100 400 Q 200 380, 300 400 T 500 400;
                     M 100 400 Q 200 420, 300 400 T 500 400;
                     M 100 400 Q 200 380, 300 400 T 500 400"
             dur="4s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Label -->
  <text x="256" y="480" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#ff006e">
    LEXI
  </text>
  <text x="256" y="500" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        text-anchor="middle" 
        fill="#8338ec">
    THE SPARK
  </text>
</svg>