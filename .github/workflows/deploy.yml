name: 🐐 GOAT App - Deploy to All Servers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - vps1-production
          - vps2-database
          - jetson-ai

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # BUILD & TEST
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 📦 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Run Tests
        run: npm test -- --passWithNoTests || true

      - name: 🏗️ Build Application
        run: npm run build --if-present

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: goat-app-build
          path: |
            server.js
            package.json
            package-lock.json
            data/
            lib/
            public/

  # ═══════════════════════════════════════════════════════════════════════════════
  # DEPLOY TO VPS #1 - PRODUCTION
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy-vps1:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'vps1-production'))
    environment:
      name: production
      url: http://72.61.193.184
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 🚀 Deploy to VPS #1 (Production)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS1_HOST }}
          username: ${{ secrets.VPS1_USER }}
          key: ${{ secrets.VPS1_SSH_KEY }}
          script: |
            set -e
            
            echo "=== 🐐 Deploying GOAT App to Production ==="
            
            # Create directory
            mkdir -p /opt/goat-app
            
            # Clone or update
            if [ -d "/opt/goat-app/.git" ]; then
              cd /opt/goat-app
              git pull origin main
            else
              rm -rf /opt/goat-app
              git clone https://github.com/DJSPEEDYGA/GOAT-Royalty-App.git /opt/goat-app
              cd /opt/goat-app
            fi
            
            # Install dependencies
            npm install --production
            
            # Setup systemd service if not exists
            if [ ! -f /etc/systemd/system/goat-app.service ]; then
              cat > /etc/systemd/system/goat-app.service << 'SERVICE'
            [Unit]
            Description=GOAT Royalty App - Production Server
            After=network.target
            
            [Service]
            Type=simple
            WorkingDirectory=/opt/goat-app
            Environment=NODE_ENV=production
            Environment=SERVER_ROLE=production
            ExecStart=/usr/bin/node server.js
            Restart=always
            RestartSec=10
            
            [Install]
            WantedBy=multi-user.target
            SERVICE
              systemctl daemon-reload
              systemctl enable goat-app
            fi
            
            # Restart service
            systemctl restart goat-app
            
            echo "✅ Production deployment complete!"

      - name: ✅ Verify Deployment
        run: |
          echo "Production URL: http://72.61.193.184:3000"

  # ═══════════════════════════════════════════════════════════════════════════════
  # DEPLOY TO VPS #2 - DATABASE
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy-vps2:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'vps2-database'))
    environment:
      name: database
      url: http://93.127.214.171
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 🗄️ Deploy to VPS #2 (Database)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ${{ secrets.VPS2_USER }}
          key: ${{ secrets.VPS2_SSH_KEY }}
          script: |
            set -e
            
            echo "=== 🗄️ Setting up Database Server ==="
            
            # Install PostgreSQL and Redis if needed
            if ! command -v psql &> /dev/null; then
              apt update
              apt install -y postgresql postgresql-contrib redis-server
            fi
            
            # Create database and user if not exists
            sudo -u postgres psql << 'SQL' || true
            CREATE DATABASE goat_db;
            CREATE USER goat_admin WITH ENCRYPTED PASSWORD 'goat_secure_2024';
            GRANT ALL PRIVILEGES ON DATABASE goat_db TO goat_admin;
            ALTER USER goat_admin WITH SUPERUSER;
            SQL
            
            # Configure PostgreSQL for remote access
            echo "host all all 72.61.193.184/32 trust" >> /etc/postgresql/*/main/pg_hba.conf
            echo "listen_addresses = '*'" >> /etc/postgresql/*/main/postgresql.conf
            systemctl restart postgresql
            
            # Configure Redis
            sed -i 's/bind 127.0.0.1/bind 0.0.0.0/' /etc/redis/redis.conf || true
            sed -i 's/# maxmemory <bytes>/maxmemory 2gb/' /etc/redis/redis.conf || true
            systemctl restart redis-server
            
            # Sync data files
            mkdir -p /opt/goat-app/data
            if [ -d "/opt/goat-app/.git" ]; then
              cd /opt/goat-app
              git pull origin main
            else
              git clone https://github.com/DJSPEEDYGA/GOAT-Royalty-App.git /opt/goat-app
            fi
            
            # Setup backup script
            mkdir -p /opt/goat-app/scripts
            cat > /opt/goat-app/scripts/backup.sh << 'BACKUP'
            #!/bin/bash
            BACKUP_DIR="/opt/backups"
            DATE=$(date +%Y%m%d_%H%M%S)
            mkdir -p $BACKUP_DIR
            pg_dump -U goat_admin goat_db > $BACKUP_DIR/goat_db_$DATE.sql
            tar -czf $BACKUP_DIR/goat_data_$DATE.tar.gz /opt/goat-app/data
            find $BACKUP_DIR -name "*.sql" -mtime +7 -delete
            find $BACKUP_DIR -name "*.tar.gz" -mtime +7 -delete
            BACKUP
            chmod +x /opt/goat-app/scripts/backup.sh
            
            # Add backup cron if not exists
            (crontab -l 2>/dev/null | grep -v "backup.sh"; echo "0 2 * * * /opt/goat-app/scripts/backup.sh >> /var/log/goat-backup.log 2>&1") | crontab -
            
            echo "✅ Database server configured!"

  # ═══════════════════════════════════════════════════════════════════════════════
  # SYNC DATA - Keep all servers in sync
  # ═══════════════════════════════════════════════════════════════════════════════
  sync-data:
    needs: [deploy-vps1, deploy-vps2]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: 🔄 Sync Data to All Servers
        run: |
          echo "Data files synced via git pull on each server"
          echo "Catalog: 511 songs"
          echo "Network: 142 profiles"

  # ═══════════════════════════════════════════════════════════════════════════════
  # NOTIFY - Send deployment status
  # ═══════════════════════════════════════════════════════════════════════════════
  notify:
    needs: [deploy-vps1, deploy-vps2]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📊 Deployment Summary
        run: |
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║              🐐 GOAT APP DEPLOYMENT COMPLETE                     ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  VPS #1 (Production) : http://72.61.193.184                     ║"
          echo "║  VPS #2 (Database)   : http://93.127.214.171                    ║"
          echo "║  Jetson (AI Engine)  : Manual deployment required               ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"