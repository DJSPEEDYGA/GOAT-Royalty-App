name: Build GOAT App - All Platforms

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '5.1.0'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: linux-build
          - os: windows-latest
            platform: win
            artifact: windows-build
          - os: macos-latest
            platform: mac
            artifact: macos-build

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: npm run electron:build:linux

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: npm run electron:build:win

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: npm run electron:build:mac

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*-portable.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: v${{ github.event.inputs.version || '5.1.0' }}
          name: SUPER GOAT Royalties v${{ github.event.inputs.version || '5.1.0' }}
          body: |
            ## 🚀 SUPER GOAT Royalties Release
            
            ### Features
            - ✅ AI-Powered Dashboard with NVIDIA NIM
            - ✅ RAG System with Knowledge Base
            - ✅ 4 Autonomous AI Agents
            - ✅ Revenue & Royalty Tracking
            - ✅ NFT Portfolio Management
            - ✅ Smart Contract Generation
            - ✅ Crypto Mining Dashboard
            - ✅ Video Editor with 3D Effects
            - ✅ DSP Distribution with Google Sheets
            - ✅ Team Collaboration Hub
            - ✅ Market Intelligence
            - ✅ **NEW: 100% Offline Local LLM** - No API, No Login, No Internet!
            
            ### Downloads
            - **Windows**: Download the .exe installer or portable version
            - **macOS**: Download the .dmg file
            - **Linux**: Download the .AppImage (portable) or .deb package
            
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}