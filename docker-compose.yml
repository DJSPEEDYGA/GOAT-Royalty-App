version: '3.8'

services:
  goat-app:
    build: .
    container_name: super-goat-royalties
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GOOGLE_AI_STUDIO_KEY=${GOOGLE_AI_STUDIO_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEMO_MODE=${DEMO_MODE:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs